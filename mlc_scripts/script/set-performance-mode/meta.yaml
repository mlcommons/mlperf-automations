alias: set-performance-mode
uid: 2c0ab7b64692443d
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: DevOps automation
tags:
- set
- system
- performance
- power
- mode

# Cache
cache: false

# Environment
new_env_keys:
- OMP_*
new_state_keys: []

# Input mapping
input_mapping: {}
input_description: {}

# Dependencies
deps:
- tags: detect-os
- tags: detect-cpu
prehook_deps: []
posthook_deps: []
post_deps: []

# Variations
variations:
  cpu:
    default: 'true'
    env:
      MLC_SET_PERFORMANCE_MODE_OF: cpu
    group: device
  performance:
    default: true
    env:
      MLC_SET_PERFORMANCE_MODE: performance
    group: performance-mode
  power:
    env:
      MLC_SET_PERFORMANCE_MODE: power
    group: power
  reproducibility:
    env:
      MLC_SET_OS_PERFORMANCE_REPRODUCIBILITY_MODE: 'yes'
