alias: install-tflite-from-src
uid: 5c72dab5eb88407c
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: AI/ML frameworks
tags:
- get
- install
- tflite-cmake
- tensorflow-lite-cmake
- from-src

# Cache
cache: true
extra_cache_tags_from_env:
- env: MLC_PYTHON_CACHE_TAGS
  prefix: python-
clean_files: []

# Environment
default_env:
  MLC_GIT_DEPTH: '1'
env:
  MLC_GIT_URL: https://github.com/tensorflow/tensorflow
new_env_keys:
- +C_INCLUDE_PATH
- +CPLUS_INCLUDE_PATH
- +LD_LIBRARY_PATH
- +DYLD_FALLBACK_LIBRARY_PATH

# Dependencies
deps:
- tags: detect,cpu
- names:
  - compiler
  tags: get,compiler
- tags: get,cmake

# Versions
default_version: master
versions:
  master:
    ad:
      compiler:
        tags: gcc
        version_min: 10.0.0
    env:
      MLC_GIT_CHECKOUT: master
