alias: get-lib-protobuf
uid: db45f1eb73934f91
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: Detection or installation of tools and artifacts
tags:
- get
- google-protobuf
- protobuf
- lib
- lib-protobuf
- google

# Cache
cache: true

# Environment
new_env_keys:
- MLC_GOOGLE_PROTOBUF_SRC_PATH
- MLC_GOOGLE_PROTOBUF_INSTALL_PATH
- +C_INCLUDE_PATH
- +CPLUS_INCLUDE_PATH
- +LD_LIBRARY_PATH
new_state_keys: []

# Input mapping
input_mapping: {}
input_description: {}

# Dependencies
deps:
- tags: get,cmake
- tags: get,gcc
prehook_deps:
- extra_cache_tags: lib,protobuf,src
  force_env_keys:
  - MLC_GIT_*
  tags: get,git,repo,_repo.https://github.com/google/protobuf.git
  update_tags_from_env_with_prefix:
    _branch.:
    - MLC_TMP_GIT_CHECKOUT
    _repo.:
    - MLC_TMP_GIT_URL
    _tag.:
    - MLC_GIT_CHECKOUT_TAG
posthook_deps: []
post_deps: []

# Variations
variations:
  branch.#:
    env:
      MLC_TMP_GIT_CHECKOUT: '#'
  tag.#:
    env:
      MLC_GIT_CHECKOUT_TAG: '#'

# Versions
default_version: 1.13.0
versions: {}
