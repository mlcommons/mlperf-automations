alias: get-tvm-model
uid: c1b7b656b6224307
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: AI/ML models
tags:
- get
- ml-model-tvm
- tvm-model

# Cache
cache: true

# Environment
default_env:
  MLC_ML_MODEL_MAX_BATCH_SIZE: '1'
  MLC_TUNE_TVM_MODEL: 'no'
  MLC_TVM_FRONTEND_FRAMEWORK: onnx
  MLC_TVM_USE_VM: 'yes'
new_env_keys:
- MLC_ML_MODEL_*
- MLC_TUNE_TVM_*
- MLC_TVM_*

# Dependencies
deps:
- names:
  - python
  - python3
  tags: get,python3
- names:
  - tvm
  tags: get,tvm
- tags: get,generic-python-lib,_decorator
- tags: get,generic-python-lib,_psutil
- tags: get,generic-python-lib,_scipy
- tags: get,generic-python-lib,_attrs
prehook_deps:
- names:
  - original-model
  tags: get,ml-model,raw
  update_tags_from_env:
  - MLC_ML_MODEL
  update_tags_from_env_with_prefix:
    _:
    - MLC_TVM_FRONTEND_FRAMEWORK

# Variations
variations:
  batch_size.#:
    env:
      MLC_ML_MODEL_MAX_BATCH_SIZE: '#'
    group: batchsize
  onnx:
    default: true
    deps:
    - names:
      - onnx
      tags: get,generic-python-lib,_onnx
    env:
      MLC_TVM_FRONTEND_FRAMEWORK: onnx
    group: frontend
  pytorch:
    deps:
    - names:
      - pytorch
      - torch
      tags: get,generic-python-lib,_torch
    - tags: get,generic-python-lib,_torchvision
    env:
      MLC_TVM_FRONTEND_FRAMEWORK: pytorch
    group: frontend
  tensorflow:
    deps:
    - names:
      - tensorflow
      tags: get,generic-python-lib,_tensorflow
    env:
      MLC_TVM_FRONTEND_FRAMEWORK: tensorflow
    group: frontend
  tflite:
    deps:
    - names:
      - tflite
      tags: get,generic-python-lib,_tflite
    env:
      MLC_TVM_FRONTEND_FRAMEWORK: tflite
    group: frontend
  model.#:
    env:
      MLC_ML_MODEL: '#'
    group: model
  fp32:
    add_deps_recursive:
      original-model:
        tags: _fp32
    default: true
    group: precision
  int8:
    add_deps_recursive:
      original-model:
        tags: _int8
    group: precision
  uint8:
    add_deps_recursive:
      original-model:
        tags: _uint8
    group: precision
  graph-executor:
    env:
      MLC_TVM_USE_VM: 'no'
    group: runtime
  virtual_machine:
    default: true
    env:
      MLC_TVM_USE_VM: 'yes'
    group: runtime
  tf:
    alias: tensorflow
  torch:
    alias: pytorch
  tune-model:
    deps:
    - tags: get,generic-python-lib,_xgboost
    - tags: get,generic-python-lib,_pandas
    - tags: get,generic-python-lib,_tornado
    env:
      MLC_TUNE_TVM_MODEL: 'yes'
