alias: install-terraform-from-src
uid: d79d47a074f34428
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: Cloud automation
tags:
- install
- terraform
- from-src

# Cache
cache: true
clean_files: []

# Environment
env:
  MLC_GIT_URL: https://github.com/hashicorp/terraform.git
new_env_keys:
- MLC_TERRAFORM_*
- +PATH

# Dependencies
deps:
- tags: detect,cpu
- tags: get,tool,go

# Versions
default_version: main
versions:
  main:
    env:
      MLC_GIT_CHECKOUT: main
