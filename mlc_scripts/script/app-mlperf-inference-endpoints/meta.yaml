alias: app-mlperf-inference-endpoints
uid: 22926c07f46c4e31
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: MLPerf Inference
tags:
- app
- mlperf
- inference
- endpoints
- endpoint
- benchmark
tags_help: app mlperf inference endpoints

# Environment
default_env:
  MLC_MLPERF_ENDPOINT_MODE: offline
  MLC_MLPERF_ENDPOINT_API_TYPE: openai
  MLC_MLPERF_ENDPOINT_TEST_MODE: perf
  MLC_MLPERF_ENDPOINT_ECHO_SERVER_PORT: '8765'
new_env_keys:
- MLC_MLPERF_ENDPOINT_QPS
- MLC_MLPERF_ENDPOINT_SAMPLES_*
- MLC_MLPERF_ENDPOINT_ELAPSED_TIME
- MLC_MLPERF_ENDPOINT_RESULTS_FILE
- MLC_MLPERF_ENDPOINT_REPORT_DIR
- MLC_MLPERF_ENDPOINT_LATENCY_*

# Input mapping
input_mapping:
  api_endpoint: MLC_MLPERF_ENDPOINT_URL
  endpoint: MLC_MLPERF_ENDPOINT_URL
  endpoints: MLC_MLPERF_ENDPOINT_URL
  model: MLC_MLPERF_ENDPOINT_MODEL
  api_key: MLC_MLPERF_ENDPOINT_API_KEY
  api_type: MLC_MLPERF_ENDPOINT_API_TYPE
  dataset: MLC_MLPERF_ENDPOINT_DATASET_PATH
  dataset_path: MLC_MLPERF_ENDPOINT_DATASET_PATH
  prompt_column: MLC_MLPERF_ENDPOINT_PROMPT_COLUMN
  num_samples: MLC_MLPERF_ENDPOINT_NUM_SAMPLES
  samples: MLC_MLPERF_ENDPOINT_NUM_SAMPLES
  load_pattern: MLC_MLPERF_ENDPOINT_LOAD_PATTERN
  target_qps: MLC_MLPERF_ENDPOINT_TARGET_QPS
  concurrency: MLC_MLPERF_ENDPOINT_CONCURRENCY
  num_workers: MLC_MLPERF_ENDPOINT_NUM_WORKERS
  workers: MLC_MLPERF_ENDPOINT_NUM_WORKERS
  duration: MLC_MLPERF_ENDPOINT_DURATION
  max_output_tokens: MLC_MLPERF_ENDPOINT_MAX_OUTPUT_TOKENS
  streaming: MLC_MLPERF_ENDPOINT_STREAMING
  tokenizer: MLC_MLPERF_ENDPOINT_TOKENIZER
  timeout: MLC_MLPERF_ENDPOINT_TIMEOUT
  output_dir: MLC_MLPERF_ENDPOINT_REPORT_DIR
  report_dir: MLC_MLPERF_ENDPOINT_REPORT_DIR
  test_mode: MLC_MLPERF_ENDPOINT_TEST_MODE
  echo_server_port: MLC_MLPERF_ENDPOINT_ECHO_SERVER_PORT
  # Run a pre-existing YAML config via `benchmark from-config`.
  config: MLC_MLPERF_ENDPOINT_CONFIG_FILE
  # Forwarded to get,mlperf,endpoints to install from a local source checkout
  # (skips the git clone). Set at the top level so it reaches the nested
  # install/clone deps before their skip_if_env is evaluated.
  endpoints_src: MLC_MLPERF_INFERENCE_ENDPOINTS_SOURCE
  src: MLC_MLPERF_INFERENCE_ENDPOINTS_SOURCE
input_description:
  model:
    desc: Model name advertised by the endpoint (required unless --echo-server)
  endpoints:
    desc: Endpoint base URL, e.g. http://host:8000
  dataset:
    desc: Dataset path; TOML-style suffixes are supported, e.g. data.jsonl
  prompt_column:
    desc: Column in the dataset holding the prompt (maps to parser.prompt)
  num_samples:
    desc: Number of samples to use from the dataset
  target_qps:
    desc: Target QPS (online/poisson; optional for offline total-query sizing)
  concurrency:
    desc: Fixed concurrent request count (online/concurrency)
  duration:
    desc: 'Minimum test duration (ms, or with a suffix: 600s, 10m)'
  test_mode:
    desc: 'inference-endpoint test mode: perf, acc, or both'
    default: perf

# Dependencies
deps:
- tags: detect,os
- tags: detect,cpu
- names:
  - python
  - python3
  tags: get,python3
- tags: get,mlperf,endpoints
  names:
  - mlperf-endpoints
  - inference-endpoint

# Variations
variations:
  offline:
    group: mode
    default: true
    env:
      MLC_MLPERF_ENDPOINT_MODE: offline
  online:
    group: mode
    env:
      MLC_MLPERF_ENDPOINT_MODE: online

  openai:
    group: api-type
    default: true
    env:
      MLC_MLPERF_ENDPOINT_API_TYPE: openai
  sglang:
    group: api-type
    env:
      MLC_MLPERF_ENDPOINT_API_TYPE: sglang
  videogen:
    group: api-type
    env:
      MLC_MLPERF_ENDPOINT_API_TYPE: videogen

  # Online load patterns. Selecting one is optional; when omitted the runner
  # infers poisson (with --target_qps) or concurrency (with --concurrency).
  poisson:
    group: load-pattern
    env:
      MLC_MLPERF_ENDPOINT_LOAD_PATTERN: poisson
  fixed-concurrency:
    group: load-pattern
    env:
      MLC_MLPERF_ENDPOINT_LOAD_PATTERN: concurrency
  multi-turn:
    group: load-pattern
    env:
      MLC_MLPERF_ENDPOINT_LOAD_PATTERN: multi_turn

  cpu-affinity:
    group: cpu-affinity
    env:
      MLC_MLPERF_ENDPOINT_CPU_AFFINITY: 'yes'
  no-cpu-affinity:
    group: cpu-affinity
    env:
      MLC_MLPERF_ENDPOINT_CPU_AFFINITY: 'no'

  # Self-contained local test: launch the bundled echo server, point the
  # benchmark at it, and default the dataset to the bundled dummy dataset.
  echo-server:
    env:
      MLC_MLPERF_ENDPOINT_USE_ECHO_SERVER: 'yes'

  # Generate a YAML config from the inputs (via generate,mlperf,endpoints-conf)
  # and run it through `benchmark from-config`. Without this variation, pass an
  # existing config with --config=<file>.
  from-config:
    env:
      MLC_MLPERF_ENDPOINT_USE_CONFIG: 'yes'
    deps:
    - tags: generate,mlperf,endpoints-conf
      names:
      - endpoints-conf
      - generate-conf

# Tests
tests:
  run_inputs:
  - variations_list:
    - offline,echo-server
    env:
      MLC_MLPERF_ENDPOINT_NUM_SAMPLES: '50'
  - variations_list:
    - online,poisson,echo-server
    env:
      MLC_MLPERF_ENDPOINT_TARGET_QPS: '50'
      MLC_MLPERF_ENDPOINT_DURATION: 5s
      MLC_MLPERF_ENDPOINT_NUM_SAMPLES: '200'
