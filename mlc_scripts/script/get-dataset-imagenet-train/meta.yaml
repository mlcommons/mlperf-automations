alias: get-dataset-imagenet-train
uid: 2bec165da5cc4ebf
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: AI/ML datasets
tags:
- get
- imagenet
- train
- dataset
- original

# Cache
cache: true

# Environment
new_env_keys:
- MLC_DATASET_PATH
- MLC_DATASET_IMAGENET_*
new_state_keys: []

# Input mapping
input_mapping:
  input: IMAGENET_TRAIN_PATH
  torrent: MLC_DATASET_IMAGENET_TRAIN_TORRENT_PATH
input_description: {}

# Dependencies
deps: []
prehook_deps:
- enable_if_env:
    MLC_DATASET_IMAGENET_VAL_REQUIRE_DAE:
    - 'yes'
    - 'True'
  env:
    MLC_EXTRACT_TO_FOLDER: imagenet-2012-train
  tags: download-and-extract,file,_extract
  update_tags_from_env:
  - MLC_DAE_EXTRA_TAGS
  update_tags_from_env_with_prefix:
    _url.:
    - MLC_DAE_URL
- enable_if_env:
    MLC_DAE_ONLY_EXTRACT:
    - 'yes'
    - 'True'
  env:
    MLC_EXTRACT_TO_FOLDER: imagenet-2012-train
  tags: file,extract
  update_tags_from_env_with_prefix:
    _path.:
    - MLC_EXTRACT_PATH
posthook_deps: []
post_deps: []

# Variations
variations: {}

# Versions
versions: {}
