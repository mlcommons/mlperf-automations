alias: flash-tinyml-binary
uid: 98913babb43f4fcb
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: TinyML automation
tags:
- flash
- tiny
- mlperf
- mlcommons

# Cache
cache: false

# Environment
local_env_keys:
- MLC_*

# Input mapping
input_mapping:
  build_dir: MLC_TINY_BUILD_DIR

# Dependencies
deps:
- tags: detect,os
- names:
  - zephyr
  tags: get,zephyr
- names:
  - zephyr-sdk
  tags: get,zephyr-sdk
- inherit_variation_tags: 'True'
  skip_if_env:
    MLC_TINY_BUILD_DIR:
    - 'on'
  tags: reproduce,tiny,mlperf

# Variations
variations:
  NRF: {}
  NUCLEO: {}
  ad: {}
  cmsis_nn: {}
  ic: {}
  kws: {}
  native: {}
  vww: {}

# Versions
default_version: r1.0
