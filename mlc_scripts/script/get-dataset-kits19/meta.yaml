alias: get-dataset-kits19
uid: 79992bb221024ac5
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: AI/ML datasets
tags:
- get
- dataset
- medical-imaging
- kits
- original
- kits19

# Cache
cache: true

# Environment
default_env:
  MLC_GIT_CHECKOUT: master
  MLC_GIT_DEPTH: --depth 2
  MLC_GIT_PATCH: 'no'
  MLC_GIT_RECURSE_SUBMODULES: ''
  MLC_GIT_URL: https://github.com/neheller/kits19
new_env_keys:
- MLC_DATASET_*

# Dependencies
deps:
- tags: detect,os
- names:
  - python3
  - python
  tags: get,python3

# Variations
variations:
  calibration:
    env:
      MLC_DATASET_CALIBRATION: 'yes'
  default:
    base:
    - short-history
    env:
      MLC_GIT_PATCH: 'no'
  full-history:
    env:
      MLC_GIT_DEPTH: ''
  no-recurse-submodules:
    env:
      MLC_GIT_RECURSE_SUBMODULES: ''
  patch:
    env:
      MLC_GIT_PATCH: 'yes'
  short-history:
    env:
      MLC_GIT_DEPTH: --depth 5
  validation:
    env:
      MLC_DATASET_VALIDATION: 'yes'

# Versions
default_version: master
versions:
  custom:
    env:
      MLC_GIT_CHECKOUT: ''
      MLC_GIT_SHA: 'yes'
  master:
    env:
      MLC_GIT_CHECKOUT: master
