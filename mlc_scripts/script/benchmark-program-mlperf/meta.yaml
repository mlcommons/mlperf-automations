alias: benchmark-program-mlperf
uid: cfff0132a8aa4018
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: MLPerf Inference
tags:
- mlperf
- benchmark-mlperf

# Environment
default_env: {}

# Variations
variations:
  no-power:
    default: true
    group: power-mode
    post_deps:
    - names:
      - benchmark-program
      tags: benchmark-program,program
  power:
    env:
      MLC_MLPERF_POWER: 'yes'
      MLC_SAVE_CONSOLE_LOG: 'no'
    group: power-mode
    new_env_keys:
    - MLC_MLPERF_*
    post_deps:
    - enable_if_env:
        MLC_MLPERF_LOADGEN_MODE:
        - performance
      names:
      - mlperf-power-client
      tags: run,mlperf,power,client
    prehook_deps:
    - names:
      - benchmark-program
      tags: benchmark-program,program
