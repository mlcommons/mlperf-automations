name: Image classification with ONNX

on:
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - '.github/workflows/test-image-classification-onnx.yml'
      - '**'
      - '!**.md'
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch: {}

jobs:
  mlc-run:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: [ "3.12"]

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Configure git longpaths (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        git config --system core.longpaths true

    - name: Install mlcflow
      run: |
        pip install mlcflow
        pip install tabulate

    - name: Pull MLOps repository
      env:
        PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.html_url || format('{0}/{1}', github.server_url, github.repository) }}
        PR_HEAD_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}
      run: |
        mlc pull repo "$PR_HEAD_REPO" --branch="$PR_HEAD_REF"
    - name: Test image classification with ONNX
      run: |
        mlcr python,app,image-classification,onnx --quiet
