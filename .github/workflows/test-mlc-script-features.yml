name: MLC script automation features test

on:
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - '.github/workflows/test-mlc-script-features.yml'
      - '**'
      - '!**.md'

permissions:
  contents: read


jobs:
  test_mlc_script_features:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.8"]
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Configure git longpaths (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        git config --system core.longpaths true
    - name: Pull MLOps repository
      shell: bash
      env:
        REPO: ${{ github.event.pull_request.head.repo.html_url }}
        BRANCH: ${{ github.event.pull_request.head.ref }}
      run: |
        pip install mlcflow
        mlc pull repo "$REPO" --branch="$BRANCH"
  
    - name: Test Python venv
      run: |
        mlcr install,python-venv --name=test --quiet
        mlc search cache --tags=get,python,virtual,name-test --quiet

    - name: Test variations
      run: |
        mlcr get,dataset,preprocessed,imagenet,_NHWC --quiet
        mlc search cache --tags=get,dataset,preprocessed,imagenet,-_NCHW
        mlc search cache --tags=get,dataset,preprocessed,imagenet,-_NHWC
        # Tests run-scripts on windows,ubuntu,macos

    - name: Test native script name variants
      run: |
        mlcr get,wkhtmltopdf --quiet

    - name: Test versions
      if: runner.os == 'linux' && matrix.python-version == '3.8'
      run: |
        mlcr get,generic-python-lib,_package.scipy --version=1.9.3 --quiet
        test $? -eq 0 || exit $?
        mlcr get,generic-python-lib,_package.scipy --version=1.9.2 --quiet
        test $? -eq 0 || exit $?
        mlc find cache --tags=get,generic-python-lib,_package.scipy,version-1.9.2
        test $? -eq 0 || exit $?
       

    - name: Test python install from src
      run: |
        mlcr python,src,install,_shared --version=3.9.10 --quiet
        mlc search cache --tags=python,src,install,_shared,version-3.9.10

  test_docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.8"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Pull MLOps repository
      shell: bash
      env:
        REPO: ${{ github.event.pull_request.head.repo.html_url }}
        BRANCH: ${{ github.event.pull_request.head.ref }}
      run: |
        pip install mlcflow
        mlc pull repo "$REPO" --branch="$BRANCH"
  
    - name: Run docker container from dockerhub on linux
      run: |
        mlcr run,docker,container --adr.compiler.tags=gcc --docker_mlc_repo=mlcommons@mlperf-automations --docker_mlc_repo_branch=dev --image_name=cm-script-app-image-classification-onnx-py --env.MLC_DOCKER_RUN_SCRIPT_TAGS=app,image-classification,onnx,python --env.MLC_DOCKER_IMAGE_BASE=ubuntu:22.04 --env.MLC_DOCKER_IMAGE_REPO=cknowledge --quiet
     
    - name: Run docker container locally on linux
      run: |
        mlcr run,docker,container --adr.compiler.tags=gcc --docker_mlc_repo=mlcommons@mlperf-automations --docker_mlc_repo_branch=dev --image_name=mlc-script-app-image-classification-onnx-py --env.MLC_DOCKER_RUN_SCRIPT_TAGS=app,image-classification,onnx,python --env.MLC_DOCKER_IMAGE_BASE=ubuntu:22.04 --env.MLC_DOCKER_IMAGE_REPO=local --quiet

  test_experiment:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.8"]
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Configure git longpaths (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        git config --system core.longpaths true
    - name: Pull MLOps repository
      shell: bash
      env:
        REPO: ${{ github.event.pull_request.head.repo.html_url }}
        BRANCH: ${{ github.event.pull_request.head.ref }}
      run: |
        pip install mlcflow
        mlc pull repo "$REPO" --branch="$BRANCH"

    - name: Test mlc experiment script
      run: |
        mlc experiment script --tags=detect,os --quiet --exp.repeat,=1,2,3
        mlc experiment script --tags=detect,cpu --quiet --exp.explore=2:10:2

  test_error_handling:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.8"]
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Configure git longpaths (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        git config --system core.longpaths true
    - name: Pull MLOps repository
      shell: bash
      env:
        REPO: ${{ github.event.pull_request.head.repo.html_url }}
        BRANCH: ${{ github.event.pull_request.head.ref }}
      run: |
        pip install mlcflow
        mlc pull repo "$REPO" --branch="$BRANCH"

    - name: Test script search failure for non-existent tags
      shell: bash
      run: |
        # Running mlcr with tags that match no script should fail
        if mlcr nonexistent,script,tags,xxxyyyzzz --quiet 2>&1; then
          echo "ERROR: Expected script search to fail but it succeeded"
          exit 1
        else
          echo "PASS: Script search correctly returned an error for non-existent tags"
        fi

    - name: Test script search failure error message
      shell: bash
      run: |
        # Verify the error message contains expected text
        OUTPUT=$(mlcr nonexistent,script,tags,xxxyyyzzz --quiet 2>&1 || true)
        if echo "$OUTPUT" | grep -qi "no scripts were found"; then
          echo "PASS: Error message correctly reports no scripts found"
        else
          echo "ERROR: Unexpected error message: $OUTPUT"
          exit 1
        fi

    - name: Create test scripts for dependency failure tests
      shell: bash
      run: |
        # Determine the MLC repo path (mlc pull repo clones to ~/MLC/repos/<owner>@<repo>)
        REPO_SCRIPT_DIR=$(python3 -c "import subprocess, re, os; out = subprocess.run(['mlc', 'find', 'script', '--tags=detect,os', '--quiet'], capture_output=True, text=True); combined = out.stdout + out.stderr; match = re.search(r'Item path:\s*(.+)', combined); print(os.path.dirname(match.group(1).strip())) if match else exit(1)")
        echo "MLC repo script dir: $REPO_SCRIPT_DIR"

        # Test script with a bogus dep
        mkdir -p "$REPO_SCRIPT_DIR/test-dep-failure"
        printf 'alias: test-dep-failure\nautomation_alias: script\nautomation_uid: 5b4e0237da074764\ndeps:\n- tags: nonexistent,dep,script,xxxyyyzzz\ntags:\n- test\n- dep-failure\nuid: aaaa1111bbbb2222\n' > "$REPO_SCRIPT_DIR/test-dep-failure/meta.yaml"
        printf '#!/bin/bash\necho "This should not run"\n' > "$REPO_SCRIPT_DIR/test-dep-failure/run.sh"
        chmod +x "$REPO_SCRIPT_DIR/test-dep-failure/run.sh"
        printf '@echo off\necho This should not run\n' > "$REPO_SCRIPT_DIR/test-dep-failure/run.bat"

        # Test script with a bogus post_dep
        mkdir -p "$REPO_SCRIPT_DIR/test-postdep-failure"
        printf 'alias: test-postdep-failure\nautomation_alias: script\nautomation_uid: 5b4e0237da074764\npost_deps:\n- tags: nonexistent,postdep,script,xxxyyyzzz\ntags:\n- test\n- postdep-failure\nuid: aaaa2222bbbb3333\n' > "$REPO_SCRIPT_DIR/test-postdep-failure/meta.yaml"
        printf '#!/bin/bash\necho "Main script runs"\n' > "$REPO_SCRIPT_DIR/test-postdep-failure/run.sh"
        chmod +x "$REPO_SCRIPT_DIR/test-postdep-failure/run.sh"
        printf '@echo off\necho Main script runs\n' > "$REPO_SCRIPT_DIR/test-postdep-failure/run.bat"

        # Test script with a bogus prehook_dep
        mkdir -p "$REPO_SCRIPT_DIR/test-prehookdep-failure"
        printf 'alias: test-prehookdep-failure\nautomation_alias: script\nautomation_uid: 5b4e0237da074764\nprehook_deps:\n- tags: nonexistent,prehookdep,script,xxxyyyzzz\ntags:\n- test\n- prehookdep-failure\nuid: aaaa3333bbbb4444\n' > "$REPO_SCRIPT_DIR/test-prehookdep-failure/meta.yaml"
        printf '#!/bin/bash\necho "Main script runs"\n' > "$REPO_SCRIPT_DIR/test-prehookdep-failure/run.sh"
        chmod +x "$REPO_SCRIPT_DIR/test-prehookdep-failure/run.sh"
        printf '@echo off\necho Main script runs\n' > "$REPO_SCRIPT_DIR/test-prehookdep-failure/run.bat"

        # Test script with a bogus posthook_dep
        mkdir -p "$REPO_SCRIPT_DIR/test-posthookdep-failure"
        printf 'alias: test-posthookdep-failure\nautomation_alias: script\nautomation_uid: 5b4e0237da074764\nposthook_deps:\n- tags: nonexistent,posthookdep,script,xxxyyyzzz\ntags:\n- test\n- posthookdep-failure\nuid: aaaa4444bbbb5555\n' > "$REPO_SCRIPT_DIR/test-posthookdep-failure/meta.yaml"
        printf '#!/bin/bash\necho "Main script runs"\n' > "$REPO_SCRIPT_DIR/test-posthookdep-failure/run.sh"
        chmod +x "$REPO_SCRIPT_DIR/test-posthookdep-failure/run.sh"
        printf '@echo off\necho Main script runs\n' > "$REPO_SCRIPT_DIR/test-posthookdep-failure/run.bat"

    - name: Test dep script search failure
      shell: bash
      run: |
        if mlcr test,dep-failure --quiet 2>&1; then
          echo "ERROR: Expected dep failure but script succeeded"
          exit 1
        else
          echo "PASS: Dependency search failure correctly caused an error"
        fi

    - name: Test post_dep script search failure
      shell: bash
      run: |
        if mlcr test,postdep-failure --quiet 2>&1; then
          echo "ERROR: Expected post_dep failure but script succeeded"
          exit 1
        else
          echo "PASS: post_dep search failure correctly caused an error"
        fi

    - name: Test prehook_dep script search failure
      shell: bash
      run: |
        if mlcr test,prehookdep-failure --quiet 2>&1; then
          echo "ERROR: Expected prehook_dep failure but script succeeded"
          exit 1
        else
          echo "PASS: prehook_dep search failure correctly caused an error"
        fi

    - name: Test posthook_dep script search failure
      shell: bash
      run: |
        if mlcr test,posthookdep-failure --quiet 2>&1; then
          echo "ERROR: Expected posthook_dep failure but script succeeded"
          exit 1
        else
          echo "PASS: posthook_dep search failure correctly caused an error"
        fi

  test_script_options:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.8"]
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Configure git longpaths (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        git config --system core.longpaths true
    - name: Pull MLOps repository
      shell: bash
      env:
        REPO: ${{ github.event.pull_request.head.repo.html_url }}
        BRANCH: ${{ github.event.pull_request.head.ref }}
      run: |
        pip install mlcflow
        mlc pull repo "$REPO" --branch="$BRANCH"

    - name: Test print_deps option
      shell: bash
      run: |
        # detect-cpu has deps on detect-os, verify deps resolved via validate script
        mlcr detect,cpu --print_deps --json --quiet > /tmp/mlc-printdeps-test.json 2>&1
        mlcr validate,mlc-json --json_file=/tmp/mlc-printdeps-test.json --expected_return=0 --dep_tags="detect,os" --quiet

    - name: Test silent option
      shell: bash
      run: |
        # --silent suppresses output (sets MLC_TMP_SILENT=yes)
        # Compare silent+quiet vs just quiet to verify silent produces no extra output
        OUTPUT_SILENT=$(mlcr detect,os --silent --quiet 2>&1)
        OUTPUT_QUIET=$(mlcr detect,os --quiet 2>&1)
        SILENT_LEN=${#OUTPUT_SILENT}
        QUIET_LEN=${#OUTPUT_QUIET}
        echo "Silent+quiet output length: $SILENT_LEN"
        echo "Quiet-only output length: $QUIET_LEN"
        if [ "$SILENT_LEN" -le "$QUIET_LEN" ]; then
          echo "PASS: Silent mode produced less or equal output"
        else
          echo "WARNING: Silent mode output was unexpectedly longer"
        fi

    - name: Test s shorthand for silent
      shell: bash
      run: |
        mlcr detect,os --s=true --quiet
        echo "PASS: --s shorthand for silent works"

    - name: Test fake_run option
      shell: bash
      run: |
        # fake_run should resolve deps but skip the main script execution
        mlcr detect,cpu --fake_run --quiet
        echo "PASS: fake_run completed successfully"

    - name: Test prepare option (alias for fake_run)
      shell: bash
      run: |
        # --prepare is an alias for --fake_run
        mlcr detect,cpu --prepare --quiet
        echo "PASS: prepare (fake_run alias) completed successfully"

  test_force_cache:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.8"]
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Configure git longpaths (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        git config --system core.longpaths true
    - name: Pull MLOps repository
      shell: bash
      env:
        REPO: ${{ github.event.pull_request.head.repo.html_url }}
        BRANCH: ${{ github.event.pull_request.head.ref }}
      run: |
        pip install mlcflow
        mlc pull repo "$REPO" --branch="$BRANCH"

    - name: Test force_cache option
      shell: bash
      run: |
        # download-file has can_force_cache: true and cache: false by default
        # Using force_cache should create a cache entry
        mlcr download,file --url="https://raw.githubusercontent.com/mlcommons/mlperf-automations/main/VERSION" --force_cache --quiet
        # Verify that a cache entry was created
        if mlc search cache --tags=download,file --quiet 2>&1; then
          echo "PASS: force_cache correctly created a cache entry"
        else
          echo "ERROR: No cache entry found after force_cache"
          exit 1
        fi

  test_cache_control:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.8"]
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Configure git longpaths (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        git config --system core.longpaths true
    - name: Pull MLOps repository
      shell: bash
      env:
        REPO: ${{ github.event.pull_request.head.repo.html_url }}
        BRANCH: ${{ github.event.pull_request.head.ref }}
      run: |
        pip install mlcflow
        mlc pull repo "$REPO" --branch="$BRANCH"

    - name: Test skip_cache option
      shell: bash
      run: |
        # skip_cache runs the script without reading or writing cache
        mlcr detect,os --skip_cache --quiet
        echo "PASS: skip_cache completed successfully without using cache"

    - name: Test new cache entry option
      shell: bash
      run: |
        # --new skips searching for existing cache but writes a new cache entry
        mlcr detect,os --new --quiet
        # Verify a cache entry exists
        mlc search cache --tags=detect,os --quiet
        echo "PASS: --new option created a fresh cache entry"

    - name: Test renew cache entry option
      shell: bash
      run: |
        # Clean any stale cache entries first to avoid picking one without mlc-cached-state.json
        mlc rm cache --tags=detect,os -f --quiet 2>/dev/null || true
        # Create a fresh cache entry
        mlcr detect,os --quiet
        # --renew overwrites the existing cache entry with fresh output
        mlcr detect,os --renew --quiet
        mlc search cache --tags=detect,os --quiet
        echo "PASS: --renew option refreshed the cache entry"

    - name: Test extra_cache_tags option
      shell: bash
      run: |
        # Run with extra cache tags and verify they appear in the cache entry
        mlcr detect,os --extra_cache_tags=test-extra-tag,ci-run --quiet
        if mlc search cache --tags=detect,os,test-extra-tag --quiet 2>&1; then
          echo "PASS: extra_cache_tags correctly added to cache entry"
        else
          echo "ERROR: extra_cache_tags not found in cache"
          exit 1
        fi

  test_version_control:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.12"]
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Configure git longpaths (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        git config --system core.longpaths true
    - name: Pull MLOps repository
      shell: bash
      env:
        REPO: ${{ github.event.pull_request.head.repo.html_url }}
        BRANCH: ${{ github.event.pull_request.head.ref }}
      run: |
        pip install mlcflow
        mlc pull repo "$REPO" --branch="$BRANCH"

    - name: Test version_min option
      if: runner.os == 'linux'
      shell: bash
      run: |
        # Install a specific version first
        mlcr get,generic-python-lib,_package.scipy --version=1.15.3 --quiet
        # Now search with version_min - should find the cached version
        mlcr get,generic-python-lib,_package.scipy --version_min=1.15.0 --quiet
        echo "PASS: version_min accepted a version above the minimum"

    - name: Test version_max option
      if: runner.os == 'linux'
      shell: bash
      run: |
        # Using version_max should constrain the accepted version
        mlcr get,generic-python-lib,_package.scipy --version_max=1.14.1 --version_max_usable=1.14.1 --quiet
        echo "PASS: version_max correctly constrained version selection"

  test_output_options:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.8"]
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Configure git longpaths (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        git config --system core.longpaths true
    - name: Pull MLOps repository
      shell: bash
      env:
        REPO: ${{ github.event.pull_request.head.repo.html_url }}
        BRANCH: ${{ github.event.pull_request.head.ref }}
      run: |
        pip install mlcflow
        mlc pull repo "$REPO" --branch="$BRANCH"

    - name: Test verbose option
      shell: bash
      run: |
        # --verbose should produce more detailed output than quiet mode
        # Use --quiet alongside to avoid interactive prompts with multiple cache entries
        OUTPUT_VERBOSE=$(mlcr detect,os --verbose --quiet 2>&1)
        OUTPUT_QUIET=$(mlcr detect,os --quiet 2>&1)
        VERBOSE_LINES=$(echo "$OUTPUT_VERBOSE" | wc -l)
        QUIET_LINES=$(echo "$OUTPUT_QUIET" | wc -l)
        echo "Verbose+quiet output lines: $VERBOSE_LINES"
        echo "Quiet-only output lines: $QUIET_LINES"
        if [ "$VERBOSE_LINES" -ge "$QUIET_LINES" ]; then
          echo "PASS: Verbose mode produced more or equal output than quiet mode"
        else
          echo "WARNING: Verbose output had fewer lines than quiet output"
        fi

    - name: Test v shorthand for verbose
      shell: bash
      run: |
        mlcr detect,os --v=true --quiet
        echo "PASS: --v shorthand for verbose works"

    - name: Test json output option
      shell: bash
      run: |
        # --json should produce valid JSON with return code, env, and expected keys
        mlcr detect,os --json --quiet > /tmp/mlc-json-test.json 2>&1
        mlcr validate,mlc-json --json_file=/tmp/mlc-json-test.json --expected_return=0 --env_keys=MLC_HOST_OS_TYPE,MLC_HOST_OS_BITS --quiet

    - name: Test j shorthand for json
      shell: bash
      run: |
        OUTPUT=$(mlcr detect,os --j=true --quiet 2>&1)
        echo "PASS: --j shorthand for json works"

    - name: Test time option
      shell: bash
      run: |
        # --time should show execution time information
        OUTPUT=$(mlcr detect,os --time --quiet 2>&1)
        echo "$OUTPUT"
        if echo "$OUTPUT" | grep -qi "time\|sec"; then
          echo "PASS: --time showed timing information"
        else
          echo "PASS: --time option completed successfully"
        fi

    - name: Test space option
      shell: bash
      run: |
        # --space should report disk space usage
        mlcr detect,os --space --quiet 2>&1
        echo "PASS: --space option completed successfully"

    - name: Test print_env option
      shell: bash
      run: |
        # --print_env prints aggregated env before each native script run
        mlcr detect,os --print_env --quiet 2>&1
        echo "PASS: --print_env completed successfully"

    - name: Test help option
      shell: bash
      run: |
        # --help should display script help and return without running
        OUTPUT=$(mlcr detect,os --help 2>&1 || true)
        if echo "$OUTPUT" | grep -qi "detect-os\|Script Name\|Run Commands"; then
          echo "PASS: --help displayed script information"
        else
          echo "ERROR: --help did not produce expected output"
          echo "$OUTPUT"
          exit 1
        fi

  test_execution_control:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.8"]
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Configure git longpaths (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        git config --system core.longpaths true
    - name: Pull MLOps repository
      shell: bash
      env:
        REPO: ${{ github.event.pull_request.head.repo.html_url }}
        BRANCH: ${{ github.event.pull_request.head.ref }}
      run: |
        pip install mlcflow
        mlc pull repo "$REPO" --branch="$BRANCH"

    - name: Test dirty option
      shell: bash
      run: |
        # --dirty skips cleaning temporary files after script execution
        # detect-os has clean_files: [tmp-run.out]
        mlcr detect,os --dirty --quiet
        echo "PASS: --dirty option completed without cleaning temp files"

    - name: Test ignore_script_error option
      shell: bash
      run: |
        # Create a script that deliberately fails inside the MLC repo's script/ directory
        REPO_SCRIPT_DIR=$(python3 -c "import subprocess, re, os; out = subprocess.run(['mlc', 'find', 'script', '--tags=detect,os', '--quiet'], capture_output=True, text=True); combined = out.stdout + out.stderr; match = re.search(r'Item path:\s*(.+)', combined); print(os.path.dirname(match.group(1).strip())) if match else exit(1)")
        mkdir -p "$REPO_SCRIPT_DIR/test-ignore-error"
        printf 'alias: test-ignore-error\nautomation_alias: script\nautomation_uid: 5b4e0237da074764\ntags:\n- test\n- ignore-error\nuid: bbbb1111cccc2222\n' > "$REPO_SCRIPT_DIR/test-ignore-error/meta.yaml"
        printf '#!/bin/bash\necho "This script fails on purpose"\nexit 1\n' > "$REPO_SCRIPT_DIR/test-ignore-error/run.sh"
        chmod +x "$REPO_SCRIPT_DIR/test-ignore-error/run.sh"
        printf '@echo off\necho This script fails on purpose\nexit /b 1\n' > "$REPO_SCRIPT_DIR/test-ignore-error/run.bat"

        # Without ignore_script_error, it should fail
        if mlcr test,ignore-error --quiet 2>&1; then
          echo "ERROR: Script should have failed"
          exit 1
        else
          echo "PASS: Script correctly failed without ignore_script_error"
        fi
        # With ignore_script_error, it should succeed despite the exit 1
        if mlcr test,ignore-error --ignore_script_error --quiet 2>&1; then
          echo "PASS: ignore_script_error correctly suppressed the error"
        else
          echo "ERROR: ignore_script_error did not suppress the error"
          exit 1
        fi

    - name: Test skip_remembered_selections option
      shell: bash
      run: |
        # --skip_remembered_selections ignores saved user selections from previous runs
        mlcr detect,os --skip_remembered_selections --quiet
        echo "PASS: skip_remembered_selections completed successfully"

  test_dependency_options:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.8"]
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Configure git longpaths (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        git config --system core.longpaths true
    - name: Pull MLOps repository
      shell: bash
      env:
        REPO: ${{ github.event.pull_request.head.repo.html_url }}
        BRANCH: ${{ github.event.pull_request.head.ref }}
      run: |
        pip install mlcflow
        mlc pull repo "$REPO" --branch="$BRANCH"

    - name: Test fake_deps option
      shell: bash
      run: |
        # --fake_deps runs dependencies in fake mode, skipping the main script
        mlcr detect,cpu --fake_deps --quiet
        echo "PASS: fake_deps completed successfully"

    - name: Test add_deps_recursive (adr) option
      shell: bash
      run: |
        # --adr passes options recursively to all dependency scripts
        # detect-cpu depends on detect-os; we can pass adr options through
        mlcr detect,cpu --adr.detect-os.tags=detect,os --quiet
        echo "PASS: adr option correctly passed through to dependencies"

    - name: Create test scripts for adr opt-out behavior
      shell: bash
      run: |
        # Determine the MLC repo path (mlc pull repo clones to ~/MLC/repos/<owner>@<repo>)
        REPO_SCRIPT_DIR=$(python3 -c "import subprocess, re, os; out = subprocess.run(['mlc', 'find', 'script', '--tags=detect,os', '--quiet'], capture_output=True, text=True); combined = out.stdout + out.stderr; match = re.search(r'Item path:\s*(.+)', combined); print(os.path.dirname(match.group(1).strip())) if match else exit(1)")
        echo "MLC repo script dir: $REPO_SCRIPT_DIR"

        mkdir -p "$REPO_SCRIPT_DIR/test-adr-recursive-local-child"
        printf 'alias: test-adr-recursive-local-child\nautomation_alias: script\nautomation_uid: 5b4e0237da074764\ndeps:\n- names:\n  - mydep\n  tags: detect,os\n  skip_add_deps_recursive: true\ntags:\n- test\n- adr-recursive-local-child\nuid: cccc1111dddd2222\n' > "$REPO_SCRIPT_DIR/test-adr-recursive-local-child/meta.yaml"
        printf '#!/bin/bash\necho "Child script runs"\n' > "$REPO_SCRIPT_DIR/test-adr-recursive-local-child/run.sh"
        chmod +x "$REPO_SCRIPT_DIR/test-adr-recursive-local-child/run.sh"
        printf '@echo off\necho Child script runs\n' > "$REPO_SCRIPT_DIR/test-adr-recursive-local-child/run.bat"

        mkdir -p "$REPO_SCRIPT_DIR/test-adr-recursive-local-parent"
        printf 'alias: test-adr-recursive-local-parent\nautomation_alias: script\nautomation_uid: 5b4e0237da074764\ndeps:\n- tags: test,adr-recursive-local-child\ntags:\n- test\n- adr-recursive-local-parent\nuid: cccc2222dddd3333\n' > "$REPO_SCRIPT_DIR/test-adr-recursive-local-parent/meta.yaml"
        printf '#!/bin/bash\necho "Parent script runs"\n' > "$REPO_SCRIPT_DIR/test-adr-recursive-local-parent/run.sh"
        chmod +x "$REPO_SCRIPT_DIR/test-adr-recursive-local-parent/run.sh"
        printf '@echo off\necho Parent script runs\n' > "$REPO_SCRIPT_DIR/test-adr-recursive-local-parent/run.bat"

    - name: Test skip_add_deps_recursive option
      shell: bash
      run: |
        # Global adr override should not modify child dep marked with skip_add_deps_recursive: true
        mlcr test,adr-recursive-local-parent --adr.mydep.tags=nonexistent,script,tags,xxxyyyzzz --quiet
        echo "PASS: skip_add_deps_recursive kept recursive adr override local-safe"
