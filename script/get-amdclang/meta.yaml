alias: get-amdclang
uid: fd0e87bcc1bc45cc
automation_alias: script
automation_uid: 5b4e0237da074764
name: Detect amdclang compiler from ROCm
category: Compiler automation
tags:
- compiler
- get
- amdclang
- c-compiler
- cpp-compiler
- f-compiler
cache: true
clean_files: []
new_env_keys:
- MLC_AMDCLANG_*
- MLC_C_COMPILER_*
- MLC_CXX_COMPILER_*
- MLC_FORTRAN_COMPILER_*
- MLC_COMPILER_*
- MLC_LINKER_*
- +PATH
deps:
- tags: get,rocm
  names:
  - get-rocm
post_deps:
- tags: get,compiler-flags
variations:
  path.#:
    env:
      MLC_AMDCLANG_DIR_PATH: '#'
  src:
    env:
      MLC_ROCM_BUILD_FROM_SRC: 'yes'
    adr:
      get-rocm:
        tags: _src
  with-runtimes:
    default: true
    group: runtimes
    adr:
      get-rocm:
        tags: _with-runtimes
  no-runtimes:
    group: runtimes
    adr:
      get-rocm:
        tags: _no-runtimes
sort: 500
tests:
  run_inputs:
  - variations_list: []
