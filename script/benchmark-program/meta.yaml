alias: benchmark-program
uid: 19f369ef47084895
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: DevOps automation
tags:
- program
- benchmark
- benchmark-program
tags_help: benchmark program

# Environment
default_env:
  MLC_ENABLE_NUMACTL: '0'
  MLC_ENABLE_PROFILING: '0'
new_env_keys:
- MLC_RUN_CMD

# Dependencies
deps:
- tags: detect,cpu
- enable_if_env:
    MLC_SET_PERFORMANCE_MODE:
    - 'on'
    - 'yes'
    - 'True'
    - true
  tags: set,performance,mode,_performance

# Variations
variations:
  numactl:
    default_env:
      MLC_ENABLE_NUMACTL: 1
      MLC_NUMACTL_MEMBIND: --localalloc
  numactl-interleave:
    default_env:
      MLC_ENABLE_NUMACTL: 1
      MLC_NUMACTL_MEMBIND: --interleave=all
  profile:
    default_env:
      MLC_ENABLE_PROFILING: 1
    deps:
    - tags: get,profiler
