alias: app-quantum-espresso
uid: b8c5d6e7f9a0123c
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: HPC Application
tags:
- app
- quantum-espresso
- hpc

# Cache
cache: true

# Environment
default_env: {}
new_env_keys:
- MLC_QE_SRC_PATH
- MLC_QE_INSTALL_PATH
- MLC_QE_BIN_PATH
- +PATH
- +LD_LIBRARY_PATH
new_state_keys: []

# Dependencies
deps:
- tags: detect,cpu
- tags: get,generic,sys-util,_libopenmpi-dev
- tags: get,generic,sys-util,_gfortran
  names:
  - gfortran
- tags: get,cmake
- tags: get,generic,sys-util,_libfftw3-dev
- tags: get,generic,sys-util,_libopenblas-dev
- tags: get,generic,sys-util,_liblapack-dev
- tags: get,generic,sys-util,_libhdf5-openmpi-dev
- tags: get,git,repo
  names:
  - qe-repo
  extra_cache_tags: quantum-espresso,repo,qe-repo
  env:
    MLC_GIT_CHECKOUT_PATH_ENV_NAME: MLC_QE_SRC_PATH
  force_env_keys:
  - MLC_GIT_*
  update_tags_from_env_with_prefix:
    _branch.:
    - MLC_GIT_CHECKOUT
    _repo.:
    - MLC_GIT_REPO_URL
    _tag.:
    - MLC_GIT_CHECKOUT_TAG
prehook_deps: []
posthook_deps: []
post_deps: []

# Variations
variations:
  repo.#:
    env:
      MLC_GIT_REPO_URL: '#'
    group: repo
  repo.official:
    default: true
    env:
      MLC_GIT_REPO_URL: https://github.com/QEF/q-e.git
    group: repo
  tag.#:
    env:
      MLC_GIT_CHECKOUT_TAG: '#'
    group: version
  version.7.2:
    group: version
    env:
      MLC_GIT_CHECKOUT_TAG: qe-7.2
  version.7.3.1:
    group: version
    env:
      MLC_GIT_CHECKOUT_TAG: qe-7.3.1
  version.7.4.1:
    default: true
    group: version
    env:
      MLC_GIT_CHECKOUT_TAG: qe-7.4.1
  branch.#:
    env:
      MLC_GIT_CHECKOUT: '#'
  develop:
    env:
      MLC_GIT_CHECKOUT: develop

# Tests
tests:
  run_inputs:
  - variations_list:
    - repo.official
