alias: get-ml-model-uniad
automation_alias: script
automation_uid: 5b4e0237da074764
cache: true
new_env_keys:
- MLC_ML_MODEL_UNIAD_PATH
- MLC_ML_MODEL_FILE_WITH_PATH
print_env_at_the_end:
  MLC_ML_MODEL_UNIAD_PATH: UNIDAD checkpoint path
tags:
- get-ml-model-uniad
tests:
  run_inputs:
  - variations_list:
    - r2-downloader,mlc,dry-run
uid: 8640817dcc924d4a
variations:
  dry-run:
    env:
      MLC_DOWNLOAD_MODE: dry
    group: run-mode
  dry-run,r2-downloader:
    env:
      MLC_DOWNLOAD_EXTRA_OPTIONS: -x
  mlc:
    default: true
    env:
      MLC_DOWNLOAD_SRC: mlcommons
    group: download-src
    prehook_deps:
    - enable_if_env:
        MLC_TMP_REQUIRE_DOWNLOAD:
        - 'yes'
      env:
        MLC_DOWNLOAD_FILENAME: unidad-checkpoint
        MLC_DOWNLOAD_FINAL_ENV_NAME: MLC_ML_MODEL_UNIAD_PATH
        MLC_EXTRACT_FINAL_ENV_NAME: MLC_ML_MODEL_UNIAD_PATH
      extra_cache_tags: ml,model,uniad
      force_cache: true
      force_env_keys:
      - MLC_OUTDIRNAME
      names:
      - unidad-model-dae
      tags: download-and-extract
      update_tags_from_env_with_prefix:
        _url.:
        - MLC_DOWNLOAD_URL
  r2-downloader:
    adr:
      unidad-model-dae:
        env:
          MLC_DOWNLOAD_URL: ""  # update the R2-downloader link when hosted in MLC storage infrastructure
        tags: _r2-downloader
    default: true
