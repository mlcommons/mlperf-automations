alias: get-lib-jemalloc
uid: 406439a446e04fb7
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: Detection or installation of tools and artifacts
tags:
- get
- lib
- lib-jemalloc
- jemalloc

# Cache
cache: true

# Environment
new_env_keys:
- MLC_JEMALLOC_PATH
- MLC_JEMALLOC_LIB_PATH
- MLC_JEMALLOC_VERSION
- +LD_LIBRARY_PATH
new_state_keys: []

# Dependencies
deps:
- tags: get,git,repo
  env:
    MLC_GIT_CHECKOUT_PATH_ENV_NAME: MLC_JEMALLOC_SRC_PATH
    MLC_GIT_REPO_VERSION_ENV_NAME: MLC_JEMALLOC_VERSION
  force_env_keys:
  - MLC_GIT_*
  update_tags_from_env_with_prefix:
    _branch.:
    - MLC_GIT_CHECKOUT
    _repo.:
    - MLC_GIT_URL
    _sha.:
    - MLC_GIT_SHA
    _submodules.:
    - MLC_GIT_SUBMODULES
    _tag.:
    - MLC_GIT_CHECKOUT_TAG
  names:
  - jemalloc-repo
  extra_cache_tags: jemalloc,repo,jemalloc-repo
- tags: get,generic-sys-util,_autoconf
- tags: get,generic-sys-util,_build-essential
  env:
    MLC_GENERIC_SYS_UTIL_IGNORE_MISSING_PACKAGE: true
prehook_deps: []
posthook_deps: []
post_deps: []

# Variations
variations:
  custom-config:
    group: config
  default-config:
    group: config
    default: true
  url.#:
    group: repo
    env:
      MLC_GIT_URL: '#'
  url.facebook:
    group: repo
    default: true
    env:
      MLC_GIT_URL: https://github.com/facebook/jemalloc.git
      MLC_JEMALLOC_VERSION_PREFIX: facebook-dev
  url.official:
    group: repo
    env:
      MLC_GIT_URL: https://github.com/jemalloc/jemalloc.git
      MLC_JEMALLOC_VERSION_PREFIX: jemalloc-dev
  branch.#:
    env:
      MLC_GIT_CHECKOUT: '#'
  config.#:
    base:
    - custom-config
    env:
      MLC_JEMALLOC_CONFIG: '#'
  enable-prof:
    base:
    - custom-config
    env:
      MLC_JEMALLOC_PROF: true
  enable-stats:
    base:
    - custom-config
    env:
      MLC_JEMALLOC_STATS: true
  lg-hugepage.#:
    base:
    - custom-config
    env:
      MLC_JEMALLOC_LG_HUGEPAGE: '#'
  lg-page.#:
    base:
    - custom-config
    env:
      MLC_JEMALLOC_LG_PAGE: '#'
  lg-quantum.#:
    base:
    - custom-config
    env:
      MLC_JEMALLOC_LG_QUANTUM: '#'
  sha.#:
    env:
      MLC_GIT_SHA: '#'
  version.#:
    env:
      MLC_GIT_CHECKOUT_TAG: '#'
  version.official:
    base:
    - url.official

# Tests
tests:
  run_inputs:
  - variations_list:
    - branch.dev,lg-page.21,lg-quantum.3
  - variations_list:
    - config.'--with-lg-page=21 --with-lg-quantum=3'
