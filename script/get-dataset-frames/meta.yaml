alias: get-dataset-frames
uid: e5f6789012345678
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: MLPerf Inference datasets
tags:
- get-dataset-frames
- get
- dataset
- frames
- e2e-rag

# Cache
cache: true

# Environment
new_env_keys:
- MLC_DATASET_FRAMES_PATH
- MLC_DATASET_FRAMES_FILE_WITH_PATH

# Variations
variations:
  mlc:
    default: true
    env:
      MLC_DOWNLOAD_SRC: mlcommons
    group: download-src
    prehook_deps:
    - enable_if_env:
        MLC_TMP_REQUIRE_DOWNLOAD:
        - 'yes'
      env:
        MLC_DOWNLOAD_FINAL_ENV_NAME: MLC_DATASET_FRAMES_PATH
        MLC_EXTRACT_FINAL_ENV_NAME: MLC_DATASET_FRAMES_PATH
      extra_cache_tags: dataset,frames,e2e-rag
      force_cache: true
      force_env_keys:
      - MLC_OUTDIRNAME
      names:
      - frames-dataset-dae
      tags: download-and-extract
      update_tags_from_env_with_prefix:
        _url.:
        - MLC_DOWNLOAD_URL
  r2-downloader:
    adr:
      frames-dataset-dae:
        tags: _r2-downloader
        env:
          MLC_DOWNLOAD_URL: https://inference.mlcommons-storage.org/metadata/frames-benchmark-dataset.uri
    default: true
    group: download-tool
  dry-run:
    env:
      MLC_DOWNLOAD_MODE: dry
    group: run-mode
  dry-run,r2-downloader:
    env:
      MLC_DOWNLOAD_EXTRA_OPTIONS: -x

# Output / debugging
print_env_at_the_end:
  MLC_DATASET_FRAMES_PATH: FRAMES benchmark dataset path

# Tests
tests:
  run_inputs:
  - variations_list:
    - r2-downloader,mlc,dry-run
