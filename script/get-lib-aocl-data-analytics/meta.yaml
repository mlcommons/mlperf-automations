alias: get-lib-aocl-data-analytics
uid: a7a6ddccdaa545dc
automation_alias: script
automation_uid: 5b4e0237da074764
category: Detection or installation of tools and artifacts
tags:
- get
- lib
- lib-aocl-data-analytics
- aocl-data-analytics
- aocl
- aocl-da
cache: true
default_env:
  MLC_AOCL_ACCEPT_EULA: 'no'
new_env_keys:
- MLC_AOCL_DA_SRC_PATH
- MLC_AOCL_DA_BUILD_PATH
- MLC_AOCL_DA_INSTALL_PATH
- MLC_AOCL_DA_LIB_PATH
- +LD_LIBRARY_PATH
- +LIBRARY_PATH
- +C_INCLUDE_PATH
- +CPLUS_INCLUDE_PATH
- MLC_AOCL_BINARY_INSTALL_PATH
- MLC_AOCL_DA_BINARY_PATH
new_state_keys: []
input_mapping:
  accept_eula: MLC_AOCL_ACCEPT_EULA
input_description:
  accept_eula:
    desc: Accept the AMD EULA for binary downloads (yes/no)
deps:
- tags: get,cmake
  skip_if_env:
    MLC_AOCL_BINARY_DOWNLOAD:
    - 'yes'
- tags: get,generic,sys-util,_libboost-all-dev
  skip_if_env:
    MLC_AOCL_BINARY_DOWNLOAD:
    - 'yes'
- tags: detect,cpu
- tags: get,utils,aocl-utils
  skip_if_env:
    MLC_AOCL_BINARY_DOWNLOAD:
    - 'yes'
- tags: get,lib,aocl-blis
  skip_if_env:
    MLC_AOCL_BINARY_DOWNLOAD:
    - 'yes'
- tags: get,lib,aocl-libflame
  skip_if_env:
    MLC_AOCL_BINARY_DOWNLOAD:
    - 'yes'
- tags: get,lib,aocl-sparse
  skip_if_env:
    MLC_AOCL_BINARY_DOWNLOAD:
    - 'yes'
- tags: get,git,repo
  names:
  - aocl-da-repo
  extra_cache_tags: aocl-da,repo,aocl-da-repo
  env:
    MLC_GIT_CHECKOUT_PATH_ENV_NAME: MLC_AOCL_DA_SRC_PATH
  force_env_keys:
  - MLC_GIT_*
  update_tags_from_env_with_prefix:
    _branch.:
    - MLC_GIT_CHECKOUT
    _repo.:
    - MLC_GIT_REPO_URL
    _tag.:
    - MLC_GIT_CHECKOUT_TAG
  skip_if_env:
    MLC_AOCL_BINARY_DOWNLOAD:
    - 'yes'
variations:
  binary.aocc:
    env:
      MLC_AOCL_BINARY_COMPILER: aocc
    group: binary-compiler
    default: true
  binary.gcc:
    env:
      MLC_AOCL_BINARY_COMPILER: gcc
    group: binary-compiler
  repo.#:
    env:
      MLC_GIT_REPO_URL: '#'
    group: repo
  repo.amd:
    default: true
    env:
      MLC_GIT_REPO_URL: https://github.com/amd/aocl-data-analytics.git
    group: repo
  tag.#:
    env:
      MLC_GIT_CHECKOUT_TAG: '#'
    group: version
  version.5.2.0:
    group: version
    env:
      MLC_GIT_CHECKOUT: 5.2.2
      MLC_AOCL_BINARY_VERSION: 5.2.0
      MLC_AOCL_BINARY_VERSION_PATH: 5-2
  version.5.2.2:
    default: true
    group: version
    env:
      MLC_GIT_CHECKOUT: 5.2.2
      MLC_AOCL_BINARY_VERSION: 5.2.0
      MLC_AOCL_BINARY_VERSION_PATH: 5-2
  binary:
    default-variations:
      version: version.5.2.0
    env:
      MLC_AOCL_BINARY_DOWNLOAD: 'yes'
      MLC_AOCL_BINARY_LIB_NAME: da
      MLC_AOCL_BINARY_COMPILER: aocc
    prehook_deps:
    - tags: download-and-extract
      names:
      - aocl-da-binary
      extra_cache_tags: aocl,da,binary
      force_cache: true
      env:
        MLC_DAE_URL: https://download.amd.com/developer/eula/data-analytics/<<<MLC_AOCL_BINARY_LIB_NAME>>>-<<<MLC_AOCL_BINARY_VERSION_PATH>>>/aocl-<<<MLC_AOCL_BINARY_LIB_NAME>>>-linux-<<<MLC_AOCL_BINARY_COMPILER>>>-<<<MLC_AOCL_BINARY_VERSION>>>.tar.gz
        MLC_DOWNLOAD_FINAL_ENV_NAME: MLC_AOCL_DA_BINARY_PATH
        MLC_EXTRACT_FINAL_ENV_NAME: MLC_AOCL_DA_BINARY_PATH
        MLC_DAE_EXTRACT_DOWNLOADED: 'yes'
      update_tags_from_env_with_prefix:
        _url.:
        - MLC_DAE_URL
      force_env_keys:
      - MLC_OUTDIRNAME
  branch.#:
    env:
      MLC_GIT_CHECKOUT: '#'
  main:
    env:
      MLC_GIT_CHECKOUT: main
tests:
  run_inputs:
  - variations_list:
    - repo.amd
  - variations_list:
    - binary
    env:
      MLC_AOCL_ACCEPT_EULA: 'yes'
