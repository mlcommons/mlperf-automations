cache: false
category: MLPerf Inference
deps:
- tags: detect,cpu
default_env:
  DIVISION: open
  CATEGORY: edge
input_mapping:
  backends: BACKENDS
  category: CATEGORY
  devices: DEVICES
  division: DIVISION
  extra_args: EXTRA_ARGS
  models: MODELS
  power_server: POWER_SERVER
