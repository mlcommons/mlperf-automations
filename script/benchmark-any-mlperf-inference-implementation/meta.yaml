      IMPLEMENTATION: reference
    default_env:
      MODELS: resnet50,retinanet,bert-99,3d-unet-99,rnnt
      CATEGORY: edge
  tflite-cpp:
    group: implementation
    env:
      IMPLEMENTATION: tflite_cpp
    default_env:
      MODELS: mobilenets
      CATEGORY: edge
      DIVISION: open
      BACKENDS: tflite
      DEVICES: cpu
  performance-only:
    group: power
