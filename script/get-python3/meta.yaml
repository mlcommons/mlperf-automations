alias: get-python3
uid: d0b5dd74373f4a62
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: Python automation
tags:
- get
- python
- python3
- get-python
- get-python3

# Cache
cache: true
extra_cache_tags_from_env:
- env: MLC_PYTHON_INSTALL_CACHE_TAGS
  prefix: python-
clean_files: []

# Environment
new_env_keys:
- MLC_PYTHON_*
- +LD_LIBRARY_PATH
- +C_INCLUDE_PATH
- +PATH
new_state_keys:
- script_prefix

# Dependencies
prehook_deps:
- enable_if_env:
    MLC_REQUIRE_INSTALL:
    - 'yes'
  inherit_variation_tags: true
  reuse_version: true
  tags: install,python,src

# Variations
variations:
  conda.#:
    adr:
      pip-package:
        tags: _conda.#
    deps:
    - names:
      - conda-package
      - conda-python
      tags: get,generic,conda-package,_name.#,_package.python
    env:
      MLC_PYTHON_CONDA: 'yes'
      MLC_PYTHON_INSTALL_CACHE_TAGS: _conda.#
  custom-path.#:
    env:
      MLC_PYTHON_BIN_WITH_PATH: '#'
  lto: {}
  optimized: {}
  shared: {}
  with-custom-ssl: {}
  with-ssl: {}

# Tests
tests:
  run_inputs:
  - variations_list: []
