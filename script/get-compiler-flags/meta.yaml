alias: get-compiler-flags
uid: 31be8b74a69742f8
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: Compiler automation
tags:
- get
- compiler-flags

# Environment
new_env_keys:
- + CFLAGS
- + CXXFLAGS
- + FFLAGS
- + LDFLAGS
- +MLC_HOST_OS_DEFAULT_INCLUDE_PATH

# Dependencies
deps:
- tags: detect,cpu
- names:
  - compiler
  skip_if_env:
    MLC_C_COMPILER_BIN:
    - 'on'
  tags: get,compiler
