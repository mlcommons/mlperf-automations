alias: get-conda
uid: 6600115f41324c7b
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: DevOps automation
tags:
- get
- conda
- get-conda

# Cache
cache: true
clean_files: []

# Environment
new_env_keys:
- +PATH
- +LD_LIBRARY_PATH
- +LIBRARY_PATH
- MLC_CONDA_PREFIX
- CONDA_PREFIX
- MLC_CONDA_BIN_PATH
- MLC_CONDA_BIN_WITH_PATH
- MLC_CONDA_LIB_PATH

# Dependencies
deps:
- tags: detect,os

# Variations
variations:
  python-3.#:
    env:
      MLC_CONDA_PYTHON_VERSION: 3.#
    group: conda-python
  python-3.8:
    env:
      MLC_CONDA_PYTHON_VERSION: '3.8'
    group: conda-python
  name.#:
    adr:
      conda-package:
        tags: _name.#
    env:
      MLC_CONDA_PREFIX_NAME: '#'
