alias: get-xpu-devices
uid: 7a3ede4d3558427a
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: XPU automation
tags:
- get
- xpu-devices

# Cache
cache: false
can_force_cache: true
cache_expiration: 1d
clean_files:
- tmp-run.out

# Environment
new_env_keys:
- MLC_XPU_*
new_state_keys:
- mlc_xpu_device_prop
- mlc_xpu_devices_prop
- mlc_xpu_num_devices

# Docker / container
docker:
  run: false
  all_gpus: 'yes'
  skip_run_cmd: 'no'
  skip_mlc_sys_upgrade: 'yes'
  mlc_repo_flags: --checkout=dev
  use_host_group_id: 'yes'
  image_tag_extra: -mlc-dev

# Output / debugging
print_files_if_script_error:
- tmp-run.out
