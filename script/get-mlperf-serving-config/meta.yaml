alias: get-mlperf-serving-config
uid: b2e4f1a9c7d30e85
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: Platform information
tags:
- get
- mlperf
- serving-config

# Cache
cache: false

# Environment
new_env_keys:
- MLC_MLPERF_SERVING_CONFIG_JSON
- MLC_MLPERF_SERVING_FRAMEWORK_TYPE

# Input mapping
input_mapping:
  log_path: MLC_MLPERF_SERVING_LOG_PATH
  out_dir_path: MLC_OUT_DIR_PATH
  serving_framework_type: MLC_MLPERF_SERVING_FRAMEWORK_TYPE

# Dependencies
deps:
- tags: detect,os
- names:
  - python
  - python3
  tags: get,python

# Output / debugging
print_env_at_the_end:
  MLC_MLPERF_SERVING_CONFIG_JSON: Path to the generated serving config JSON file.
