alias: get-tool-intel-sde
uid: 3546409e71c847bc
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: MLC Utils
tags:
- get-intel-sde-tool
- get
- intel
- sde
- tool
- sde-tool

# Cache
cache: true

# Environment
new_env_keys:
- MLC_INTEL_SDE_DIR_PATH
- MLC_INTEL_SDE_BIN_WITH_PATH
- MLC_INTEL_SDE_VERSION
- +PATH
new_state_keys: []

# Input mapping
input_mapping:
  sde_dir: MLC_INTEL_SDE_DIR_PATH

# Dependencies
deps:
- tags: detect,os
- enable_if_env:
    MLC_DOWNLOAD_URL:
    - true
  extra_cache_tags: intel,sde,tool
  force_cache: true
  skip_if_env:
    MLC_INTEL_SDE_DIR_PATH:
    - true
  tags: download-and-extract,_extract
  update_tags_from_env_with_prefix:
    _url.:
    - MLC_DOWNLOAD_URL
posthook_deps: []
post_deps: []

# Variations
variations:
  version.9_53_0:
    default: true
    env:
      MLC_DOWNLOAD_URL: https://downloadmirror.intel.com/850782/sde-external-9.53.0-2025-03-16-lin.tar.xz
    group: version

# Tests
tests:
  run_inputs:
  - {}
