alias: get-google-test
uid: 02945138a5614253
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: Detection or installation of tools and artifacts
tags:
- get
- google-test
- googletest
- gtest
- test
- google

# Cache
cache: true

# Environment
new_env_keys:
- MLC_GOOGLE_TEST_SRC_PATH
- MLC_GOOGLE_TEST_INSTALL_PATH
- +C_INCLUDE_PATH
- +LD_LIBRARY_PATH
new_state_keys: []

# Input mapping
input_mapping: {}
input_description: {}

# Dependencies
deps:
- names:
  - cmake
  tags: get,cmake
- names:
  - compiler
  tags: get,compiler
prehook_deps:
- extra_cache_tags: google-test,gtest
  force_env_keys:
  - MLC_GIT_*
  tags: get,git,repo,_repo.https://github.com/google/googletest.git
posthook_deps: []
post_deps: []

# Versions
default_version: 1.14.0
versions: {}
