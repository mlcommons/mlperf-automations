alias: runtime-system-infos
uid: 755cf27627784001
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: MLPerf Inference
tags:
- runtime
- system
- utilisation
- infos

# Cache
cache: false

# Input mapping
input_mapping:
  interval: MLC_SYSTEM_INFO_MEASUREMENT_INTERVAL
  log_dir: MLC_LOGS_DIR

# Dependencies
deps:
- tags: detect,os
- tags: detect,cpu
- tags: get,sys-utils-mlc
- tags: get,python3
  names:
  - python
  - python3

# Variations
variations:
  all:
    group: devices
  cpu:
    group: devices
  cuda:
    group: devices

# Docker / container
docker:
  real_run: false
