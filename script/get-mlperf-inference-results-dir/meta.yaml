alias: get-mlperf-inference-results-dir
uid: 84f3c5aad5e1444b
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: MLPerf Inference
tags:
- get
- mlperf
- inference
- local
- results
- dir
- directory

# Cache
cache: true

# Environment
new_env_keys:
- MLC_MLPERF_INFERENCE_RESULTS_DIR
- MLC_MLPERF_INFERENCE_RESULTS_VERSION
new_state_keys: []

# Input mapping
input_mapping:
  results_dir: MLC_MLPERF_INFERENCE_RESULTS_DIR
input_description: {}

# Dependencies
deps: []
prehook_deps: []
posthook_deps: []
post_deps: []

# Variations
variations:
  version.#:
    env:
      MLC_MLPERF_INFERENCE_RESULTS_VERSION: '#'
    group: version
  version.4_1:
    env:
      MLC_MLPERF_INFERENCE_RESULTS_VERSION: '4_1'
    group: version
  version.4_1-dev:
    default: true
    env:
      MLC_MLPERF_INFERENCE_RESULTS_VERSION: 4_1-dev
    group: version
  path.#:
    MLC_MLPERF_INFERENCE_RESULTS_DIR: '#'

# Versions
versions: {}

# Docker / container
docker:
  run: false
