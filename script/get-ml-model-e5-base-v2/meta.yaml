alias: get-ml-model-e5-base-v2
uid: a1b2c3d4e5f67890
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: AI/ML models
tags:
- get-ml-model-e5-base-v2
- get
- ml-model
- e5-base-v2
- embedding
- retrieval

# Cache
cache: true

# Environment
new_env_keys:
- MLC_ML_MODEL_E5_BASE_V2_PATH
- MLC_ML_MODEL_FILE_WITH_PATH

# Input mapping
input_mapping:
  checkpoint: MLC_ML_MODEL_E5_BASE_V2_PATH

# Dependencies
prehook_deps:
- enable_if_env:
    MLC_TMP_REQUIRE_DOWNLOAD:
    - 'yes'
    MLC_DOWNLOAD_SRC:
    - huggingface
  env: {}
  extra_cache_tags: e5-base-v2
  force_env_keys:
  - MLC_GIT_CHECKOUT_FOLDER
  names:
  - hf-zoo
  tags: get,ml-model,huggingface,zoo,_clone-repo

# Variations
variations:
  huggingface:
    group: download-src
    env:
      MLC_DOWNLOAD_SRC: huggingface
  mlc:
    default: true
    env:
      MLC_DOWNLOAD_SRC: mlcommons
    group: download-src
    prehook_deps:
    - enable_if_env:
        MLC_TMP_REQUIRE_DOWNLOAD:
        - 'yes'
      env:
        MLC_DOWNLOAD_FINAL_ENV_NAME: MLC_ML_MODEL_E5_BASE_V2_PATH
        MLC_EXTRACT_FINAL_ENV_NAME: MLC_ML_MODEL_E5_BASE_V2_PATH
      extra_cache_tags: ml,model,e5-base-v2
      force_cache: true
      force_env_keys:
      - MLC_OUTDIRNAME
      names:
      - e5-base-v2-model-dae
      tags: download-and-extract
      update_tags_from_env_with_prefix:
        _url.:
        - MLC_DOWNLOAD_URL
  r2-downloader:
    adr:
      e5-base-v2-model-dae:
        tags: _r2-downloader
        env:
          MLC_DOWNLOAD_URL: https://inference.mlcommons-storage.org/metadata/intfloat_e5-base-v2.uri
    default: true
    group: download-tool
  intfloat/e5-base-v2:
    adr:
      hf-zoo:
        tags: _model-stub.intfloat/e5-base-v2
    env:
      MLC_GIT_CHECKOUT_FOLDER: e5-base-v2
      MLC_MODEL_ZOO_ENV_KEY: E5_BASE_V2
    group: huggingface-stub
    default: true
  dry-run:
    env:
      MLC_DOWNLOAD_MODE: dry
    group: run-mode
  dry-run,r2-downloader:
    env:
      MLC_DOWNLOAD_EXTRA_OPTIONS: -x

# Output / debugging
print_env_at_the_end:
  MLC_ML_MODEL_E5_BASE_V2_PATH: e5-base-v2 model path

# Tests
tests:
  run_inputs:
  - variations_list:
    - r2-downloader,mlc,dry-run
