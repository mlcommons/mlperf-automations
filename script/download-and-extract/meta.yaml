alias: download-and-extract
uid: c67e81a4ce2649f5
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: DevOps automation
tags:
- dae
- file
- download-and-extract
tags_help: download-and-extract file

# Cache
cache: false
can_force_cache: true

# Environment
new_env_keys:
- MLC_DOWNLOAD_DOWNLOADED_PATH*
- MLC_EXTRACT_EXTRACTED_PATH
- MLC_EXTRACT_EXTRACTED_SUBDIR_PATH
- <<<MLC_DOWNLOAD_FINAL_ENV_NAME>>>
- <<<MLC_EXTRACT_FINAL_ENV_NAME>>>
- <<<MLC_DAE_FINAL_ENV_NAME>>>
- MLC_GET_DEPENDENT_CACHED_PATH
new_state_keys: []

# Input mapping
input_mapping:
  download_path: MLC_DOWNLOAD_PATH
  extra_folder: MLC_EXTRACT_TO_FOLDER
  extract_path: MLC_EXTRACT_PATH
  from: MLC_DOWNLOAD_LOCAL_FILE_PATH
  local_path: MLC_DOWNLOAD_LOCAL_FILE_PATH
  store: MLC_DOWNLOAD_PATH
  to: MLC_EXTRACT_PATH
  url: MLC_DAE_URL
input_description: {}

# Dependencies
deps: []
prehook_deps:
- names:
  - download-script
  skip_if_env:
    MLC_DAE_DOWNLOAD_USING_TORRENT:
    - 'yes'
    - 'True'
  tags: download,file
  force_env_keys:
  - MLC_OUTDIRNAME
  update_tags_from_env_with_prefix:
    _url.:
    - MLC_DAE_URL
posthook_deps:
- enable_if_env:
    MLC_DAE_EXTRACT_DOWNLOADED:
    - 'yes'
    - 'True'
  skip_if_env:
    MLC_DOWNLOAD_MODE:
    - dry
  names:
  - extract-script
  tags: extract,file
  force_env_keys:
  - MLC_OUTDIRNAME
  update_tags_from_env_with_prefix:
    _path.:
    - MLC_DOWNLOAD_DOWNLOADED_PATH
    - MLC_TORRENT_DOWNLOADED_PATH
post_deps: []

# Variations
variations:
  curl:
    add_deps:
      download-script:
        tags: _wget
    group: download-tool
  gdown:
    add_deps:
      download-script:
        tags: _gdown
    group: download-tool
  mlcutil:
    add_deps:
      download-script:
        tags: _mlcutil
    default: true
    group: download-tool
  r2-downloader:
    add_deps:
      download-script:
        tags: _r2-downloader
    group: download-tool
  rclone:
    add_deps:
      download-script:
        tags: _rclone
    group: download-tool
  torrent:
    env:
      MLC_DAE_DOWNLOAD_USING_TORRENT: 'yes'
      MLC_TORRENT_DOWNLOADED_FILE_NAME: <<<MLC_DAE_FILENAME>>>
      MLC_TORRENT_DOWNLOADED_PATH_ENV_KEY: MLC_DAE_FILEPATH
      MLC_TORRENT_WAIT_UNTIL_COMPLETED: 'yes'
    group: download-tool
    new_env_keys:
    - MLC_TORRENT_DOWNLOADED_PATH
    prehook_deps:
    - tags: download,torrent
      update_tags_from_env_with_prefix:
        _torrent.:
        - MLC_DAE_TORRENT_PATH
  wget:
    add_deps:
      download-script:
        tags: _wget
    group: download-tool
  keep:
    default: 'true'
    env:
      MLC_EXTRACT_REMOVE_EXTRACTED: 'no'
    add_deps:
      extract-script:
        tags: _keep
    group: keep
  remove-extracted:
    env:
      MLC_EXTRACT_REMOVE_EXTRACTED: 'yes'
    group: keep
    add_deps:
      extract-script:
        tags: _remove-extracted
  cmutil:
    alias: mlcutil
  extract:
    env:
      MLC_DAE_EXTRACT_DOWNLOADED: 'yes'
  extract-to-download-dir:
    env:
      MLC_DAE_EXTRACT_TO_DOWNLOADED: 'yes'
  url.#:
    env:
      MLC_DAE_URL: '#'

# Versions
versions: {}

# Tests
tests:
  run_inputs:
  - variations_list:
    - url.https://github.com/octocat/Hello-World/archive/refs/heads/master.tar.gz,extract
  - variations_list:
    - url.https://raw.githubusercontent.com/octocat/Hello-World/refs/heads/master/README
