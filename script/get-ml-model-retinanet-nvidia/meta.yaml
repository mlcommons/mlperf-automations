alias: get-ml-model-retinanet-nvidia
uid: f059d249fac843ba
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: AI/ML models
tags:
- get
- ml-model
- nvidia-retinanet
- nvidia

# Cache
cache: true

# Environment
default_env:
  MLC_TORCH_DEVICE: cpu
new_env_keys:
- MLC_NVIDIA_RETINANET_*
- MLC_ML_MODEL_*

# Dependencies
deps:
- tags: detect,os
- names:
  - python
  - python3
  tags: get,python3
- tags: get,mlperf,training,src,_nvidia-retinanet
- tags: get,mlperf,inference,src
- tags: get,ml-model,retinanet,_pytorch,_fp32,_weights
  force_env_keys:
  - MLC_OUTDIRNAME
- enable_if_env:
    MLC_TORCH_DEVICE: cpu
  tags: get,generic-python-lib,_torch
- tags: get,generic-python-lib,_torchvision
- tags: get,generic-python-lib,_mlperf_logging
- enable_if_env:
    MLC_TORCH_DEVICE: cuda
  tags: get,cuda
- enable_if_env:
    MLC_TORCH_DEVICE: cuda
  tags: get,generic-python-lib,_torch_cuda
- tags: get,nvidia,mlperf,inference,common-code,-_custom

# Variations
variations:
  efficient-nms:
    deps:
    - tags: get,generic-python-lib,_polygraphy
    env:
      MLC_NVIDIA_EFFICIENT_NMS: 'yes'

# Output / debugging
print_env_at_the_end:
  MLC_NVIDIA_RETINANET_EFFICIENT_NMS_CONCAT_MODEL_WITH_PATH: Path to the ML model
