alias: benchmark-program-phoronix
automation_alias: script
automation_uid: 5b4e0237da074764
category: Benchmarking
cache: true
default_env:
  MLC_PHORONIX_TEST: 'pts/compress-7zip'
  MLC_PHORONIX_NUM_RUNS: '3'
  MLC_PHORONIX_BATCH_MODE: 'yes'
  MLC_PHORONIX_EXTRA_ARGS: ''
  MLC_PHORONIX_VERSION: '10.8.4'
deps:
- tags: detect,os
- tags: detect,cpu
- tags: download-and-extract
  names:
  - phoronix-deb
  extra_cache_tags: phoronix,test-suite,deb
  force_cache: true
  skip_if_env:
    MLC_PHORONIX_INSTALLED:
    - 'yes'
  env:
    MLC_DAE_URL: 'https://github.com/phoronix-test-suite/phoronix-test-suite/releases/download/v<<<MLC_PHORONIX_VERSION>>>/phoronix-test-suite_<<<MLC_PHORONIX_VERSION>>>_all.deb'
    MLC_DOWNLOAD_FINAL_ENV_NAME: MLC_PHORONIX_DEB_PATH
    MLC_VERIFY_SSL: 'no'
input_mapping:
  test: MLC_PHORONIX_TEST
  num_runs: MLC_PHORONIX_NUM_RUNS
  batch_mode: MLC_PHORONIX_BATCH_MODE
  extra_args: MLC_PHORONIX_EXTRA_ARGS
  results_dir: MLC_PHORONIX_RESULTS_DIR
  result_identifier: MLC_PHORONIX_RESULT_IDENTIFIER
  reuse_logs: MLC_PHORONIX_REUSE_LOGS
new_env_keys:
- MLC_PHORONIX_*
- MLC_PHORONIX_DEB_PATH
tags:
- benchmark
- phoronix
- pts
- benchmark-phoronix
- benchmark-program-phoronix
uid: a1b2c3d4e5f60003
variations:
  compress-7zip:
    default: true
    env:
      MLC_PHORONIX_TEST: 'pts/compress-7zip'
    group: test
  build-linux-kernel:
    env:
      MLC_PHORONIX_TEST: 'pts/build-linux-kernel'
    group: test
  openssl:
    env:
      MLC_PHORONIX_TEST: 'pts/openssl'
    group: test
  nginx:
    env:
      MLC_PHORONIX_TEST: 'pts/nginx'
    group: test
  renaissance:
    env:
      MLC_PHORONIX_TEST: 'pts/renaissance'
    group: test
  john-the-ripper:
    env:
      MLC_PHORONIX_TEST: 'pts/john-the-ripper'
    group: test
  custom:
    env:
      MLC_PHORONIX_TEST: ''
    group: test

tests:
  run_inputs:
  - variations_list:
    - compress-7zip
    env:
      MLC_PHORONIX_NUM_RUNS: '1'
  - variations_list:
    - openssl
    env:
      MLC_PHORONIX_NUM_RUNS: '1'
