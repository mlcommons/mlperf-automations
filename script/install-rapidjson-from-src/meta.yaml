alias: install-rapidjson-from-src
uid: 5171e69b4bb94989
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
name: Build rapidjson from sources
category: Compiler automation
tags:
- install
- get
- src
- from.src
- rapidjson
- src-rapidjson

# Cache
cache: true

# Environment
env: {}
new_env_keys:
- MLC_RAPIDJSON_*

# Dependencies
deps:
- tags: detect,os
- tags: detect,cpu
- env:
    MLC_GIT_CHECKOUT_PATH_ENV_NAME: MLC_RAPIDJSON_SRC_REPO_PATH
  extra_cache_tags: rapidjson,src,rapidjson-src,rapidjson-src-repo
  names:
  - rapidjson-src-repo
  - rapidjson-src
  tags: get,git,repo
  update_tags_from_env_with_prefix:
    _branch.:
    - MLC_GIT_CHECKOUT
    _repo.:
    - MLC_GIT_URL
    _sha.:
    - MLC_GIT_CHECKOUT_SHA
    _tag.:
    - MLC_GIT_CHECKOUT_TAG
prehook_deps: []

# Variations
variations:
  repo.#:
    env:
      MLC_GIT_URL: '#'
    group: repo
  repo.https://github.com/Tencent/rapidjson:
    default: true
    env:
      MLC_GIT_URL: https://github.com/Tencent/rapidjson
    group: repo
  branch.#:
    env:
      MLC_GIT_CHECKOUT: '#'
  sha.#:
    env:
      MLC_GIT_CHECKOUT_SHA: '#'
  tag.#:
    ad:
      rapidjson-src-repo:
        tags: _no-recurse-submodules,_full-history
    env:
      MLC_GIT_CHECKOUT_TAG: '#'

# Versions
versions: {}

# Output / debugging
sort: 1000
