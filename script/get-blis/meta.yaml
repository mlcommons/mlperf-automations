alias: get-blis
uid: ea6e1cf75242456c
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: Detection or installation of tools and artifacts
tags:
- get
- lib
- blis

# Cache
cache: true

# Environment
new_env_keys:
- MLC_BLIS_SRC_PATH
- +LD_LIBRARY_PATH
- MLC_BLIS_INSTALL_PATH
- MLC_BLIS_INC
- MLC_BLIS_LIB
new_state_keys: []

# Input mapping
input_mapping: {}
input_description: {}

# Dependencies
deps:
- force_env_keys:
  - MLC_GIT_CHECKOUT
  names:
  - blis-source-repo
  tags: get,git
- tags: detect,cpu
prehook_deps: []
posthook_deps: []
post_deps: []

# Variations
variations:
  amd:
    add_deps_recursive:
      blis-source-repo:
        tags: _repo.https://github.com/amd/libflame.git
    group: source
  flame:
    add_deps_recursive:
      blis-source-repo:
        tags: _repo.https://github.com/flame/blis.git
    default: true
    group: source

# Versions
default_version: master
versions:
  0.9.0:
    env:
      MLC_GIT_CHECKOUT: 0.9.0
  master:
    env:
      MLC_GIT_CHECKOUT: master
