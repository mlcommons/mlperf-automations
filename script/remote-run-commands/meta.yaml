alias: remote-run-commands
uid: b71e24b03c9d49cd
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: Remote automation
tags:
- remote
- run
- cmds
- remote-run
- remote-run-cmds
- ssh-run
- ssh

# Dependencies
deps:
- tags: detect-os
- tags: get,sys-util,generic,_rsync
  env:
    MLC_QUIET: true
  names:
  - rsync
  skip_if_env:
    MLC_HOST_OS_TYPE:
    - windows

# Environment
default_env:
  MLC_SSH_CLIENT_REFRESH: '10'
  MLC_SSH_HOST: localhost
  MLC_SSH_KEY_FILE: <<<HOME>>>/.ssh/id_rsa
  MLC_SSH_PORT: '22'
  MLC_SSH_TARGET_COPY_DIRECTORY: .

# Input mapping
input_mapping:
  client_refresh: MLC_SSH_CLIENT_REFRESH
  copy_directory: MLC_SSH_TARGET_COPY_DIRECTORY
  files_to_copy: MLC_SSH_FILES_TO_COPY
  files_to_copy_back: MLC_SSH_FILES_TO_COPY_BACK
  host: MLC_SSH_HOST
  post_run_cmds: MLC_SSH_POST_RUN_CMDS
  pre_run_cmds: MLC_SSH_PRE_RUN_CMDS
  password: MLC_SSH_PASSWORD
  path_to_copy_back_files: MLC_SSH_PATH_TO_COPY_BACK_FILES
  port: MLC_SSH_PORT
  run_cmds: MLC_SSH_RUN_COMMANDS
  skip_host_verify: MLC_SSH_SKIP_HOST_VERIFY
  skip_ssh_key_file: MLC_SKIP_SSH_KEY_FILE
  ssh_key_file: MLC_SSH_KEY_FILE
  user: MLC_SSH_USER
  shell: MLC_SSH_REMOTE_SHELL
