alias: get-lib-aocl-dlp
uid: 6e53d253a8ee490b
automation_alias: script
automation_uid: 5b4e0237da074764

category: Detection or installation of tools and artifacts
tags:
- get
- lib
- lib-aocl-dlp
- aocl-dlp
- aocl

cache: true

new_env_keys:
- MLC_AOCL_DLP_SRC_PATH
- MLC_AOCL_DLP_BUILD_PATH
- MLC_AOCL_DLP_INSTALL_PATH
- MLC_AOCL_DLP_LIB_PATH
- +LD_LIBRARY_PATH
- +LIBRARY_PATH
- +C_INCLUDE_PATH
- +CPLUS_INCLUDE_PATH
new_state_keys: []

deps:
- tags: get,cmake
- tags: detect,cpu
- tags: get,utils,aocl-utils
- tags: get,git,repo
  names:
  - aocl-dlp-repo
  extra_cache_tags: aocl-dlp,repo,aocl-dlp-repo
  env:
    MLC_GIT_CHECKOUT_PATH_ENV_NAME: MLC_AOCL_DLP_SRC_PATH
  force_env_keys:
  - MLC_GIT_*
  update_tags_from_env_with_prefix:
    _branch.:
    - MLC_GIT_CHECKOUT
    _repo.:
    - MLC_GIT_REPO_URL
    _tag.:
    - MLC_GIT_CHECKOUT_TAG

variations:
  branch.#:
    env:
      MLC_GIT_CHECKOUT: '#'
  tag.#:
    env:
      MLC_GIT_CHECKOUT_TAG: '#'
    group: version
  repo.#:
    env:
      MLC_GIT_REPO_URL: '#'
    group: repo
  repo.amd:
    default: true
    env:
      MLC_GIT_REPO_URL: https://github.com/amd/aocl-dlp.git
    group: repo

default_version: main
versions:
  main:
    env:
      MLC_GIT_CHECKOUT: main

tests:
  run_inputs:
  - variations_list:
    - repo.amd
