alias: get-sys-util-windows
uid: b29b81e542184fb8
automation_alias: script
automation_uid: 5b4e0237da074764

category: Detection or installation of tools and artifacts
tags:
- get
- sys-util
- windows
- get-sys-util-windows

cache: true

default_env:
  MLC_CLEAN_DIRS: bin
  MLC_SYS_UTIL_VERSION_CMD: ''

deps:
- tags: detect,os

env:
  MLC_GENERIC_SYS_UTIL_INSTALL_NEEDED: 'no'
  MLC_SYS_UTIL_VERSION_CMD: ''

input_mapping:
  fail_safe: MLC_TMP_FAIL_SAFE
  ignore_missing: MLC_GENERIC_SYS_UTIL_IGNORE_MISSING_PACKAGE

new_env_keys:
- +PATH

variations:
  detect:
    default: true
    env:
      MLC_GENERIC_SYS_UTIL_RUN_MODE: detect
    group: mode
    prehook_deps:
    - enable_if_env:
        MLC_GENERIC_SYS_UTIL_INSTALL_NEEDED:
        - 'yes'
      force_env_keys:
      - MLC_TMP_FAIL_SAFE
      inherit_variation_tags: true
      names:
      - install-sys-util
      skip_inherit_variation_groups:
      - mode
      tags: get,sys-util,windows,_install
  install:
    env:
      MLC_GENERIC_SYS_UTIL_RUN_MODE: install
    group: mode
    new_env_keys:
    - MLC_TMP_GENERIC_SYS_UTIL_PACKAGE_INSTALL_IGNORED
    - MLC_GET_GENERIC_SYS_UTIL_INSTALL_FAILED
  autoconf:
    env:
      MLC_SYS_UTIL_NAME: autoconf
      MLC_SYS_UTIL_VERSION_CMD: autoconf --version
      MLC_SYS_UTIL_VERSION_RE: autoconf \(.*\) ([\d.]+)
      MLC_TMP_VERSION_DETECT_GROUP_NUMBER: 1
    new_env_keys:
    - MLC_AUTOCONF_VERSION
    state:
      autoconf:
        choco: autoconf
  bzip2:
    env:
      MLC_SYS_UTIL_NAME: bzip2
      MLC_SYS_UTIL_VERSION_CMD: bzip2 --version
      MLC_SYS_UTIL_VERSION_RE: ([0-9]+(\.[0-9]+)+)
      MLC_TMP_VERSION_DETECT_GROUP_NUMBER: 1
    new_env_keys:
    - MLC_BZIP2_VERSION
    state:
      bzip2:
        choco: bzip2
  ccache:
    env:
      MLC_SYS_UTIL_NAME: ccache
      MLC_SYS_UTIL_VERSION_CMD: ccache --version
      MLC_SYS_UTIL_VERSION_RE: ccache version ([0-9.]+)
      MLC_TMP_VERSION_DETECT_GROUP_NUMBER: 0
    new_env_keys:
    - MLC_CCACHE_VERSION
    state:
      ccache:
        choco: ccache
  cmake:
    env:
      MLC_SYS_UTIL_NAME: cmake
      MLC_SYS_UTIL_VERSION_CMD: cmake --version
      MLC_SYS_UTIL_VERSION_RE: cmake version ([\d.]+)
      MLC_TMP_VERSION_DETECT_GROUP_NUMBER: 1
    new_env_keys:
    - MLC_CMAKE_VERSION
    state:
      cmake:
        choco: cmake
  ffmpeg:
    env:
      MLC_SYS_UTIL_NAME: ffmpeg
      MLC_SYS_UTIL_VERSION_CMD: ffmpeg -version
      MLC_TMP_VERSION_DETECT_GROUP_NUMBER: 0
    new_env_keys:
    - MLC_FFMPEG_VERSION
    state:
      ffmpeg:
        choco: ffmpeg
  fio:
    env:
      MLC_SYS_UTIL_NAME: fio
      MLC_SYS_UTIL_VERSION_CMD: fio --version
      MLC_TMP_VERSION_DETECT_GROUP_NUMBER: 0
    new_env_keys:
    - MLC_FIO_VERSION
    state:
      fio:
        choco: fio
  flex:
    env:
      MLC_SYS_UTIL_NAME: flex
      MLC_SYS_UTIL_VERSION_CMD: flex --version
      MLC_TMP_VERSION_DETECT_GROUP_NUMBER: 0
    new_env_keys:
    - MLC_FLEX_VERSION
    state:
      flex:
        choco: winflexbison3
  git-lfs:
    env:
      MLC_SYS_UTIL_NAME: git-lfs
      MLC_SYS_UTIL_VERSION_CMD: git-lfs --version
      MLC_SYS_UTIL_VERSION_RE: git-lfs\/([\d.]+)
      MLC_TMP_VERSION_DETECT_GROUP_NUMBER: 0
    new_env_keys:
    - MLC_GIT_LFS_VERSION
    state:
      git-lfs:
        choco: git-lfs
  jq:
    env:
      MLC_SYS_UTIL_NAME: jq
      MLC_SYS_UTIL_VERSION_CMD: jq --version
      MLC_SYS_UTIL_VERSION_RE: jq-([\d.]+)
      MLC_TMP_VERSION_DETECT_GROUP_NUMBER: 0
    new_env_keys:
    - MLC_JQ_VERSION
    state:
      jq:
        choco: jq
  nasm:
    env:
      MLC_SYS_UTIL_NAME: nasm
      MLC_SYS_UTIL_VERSION_CMD: nasm --version
      MLC_SYS_UTIL_VERSION_RE: NASM version ([\d.]+)
      MLC_TMP_VERSION_DETECT_GROUP_NUMBER: 0
    new_env_keys:
    - MLC_NASM_VERSION
    state:
      nasm:
        choco: nasm
  ninja-build:
    env:
      MLC_SYS_UTIL_NAME: ninja-build
      MLC_SYS_UTIL_VERSION_CMD: ninja --version
      MLC_SYS_UTIL_VERSION_RE: ([\d.]+)
      MLC_TMP_VERSION_DETECT_GROUP_NUMBER: 0
    new_env_keys:
    - MLC_NINJA_BUILD_VERSION
    state:
      ninja-build:
        choco: ninja
  nvidia-cuda-toolkit:
    env:
      MLC_SYS_UTIL_NAME: nvidia-cuda-toolkit
      MLC_SYS_UTIL_VERSION_CMD: nvcc --version
      MLC_SYS_UTIL_VERSION_RE: release ([\d.]+)
      MLC_TMP_VERSION_DETECT_GROUP_NUMBER: 1
    new_env_keys:
    - MLC_NVIDIA_CUDA_TOOLKIT_VERSION
    state:
      nvidia-cuda-toolkit:
        choco: cuda
  pkg-config:
    env:
      MLC_SYS_UTIL_NAME: pkg_config
      MLC_SYS_UTIL_VERSION_RE: \b(\d+\.\d+(?:\.\d+)?)\b
      MLC_TMP_VERSION_DETECT_GROUP_NUMBER: 0
    state:
      pkg_config:
        choco: pkgconfiglite
  rsync:
    env:
      MLC_SYS_UTIL_NAME: rsync
      MLC_SYS_UTIL_VERSION_CMD: rsync --version
      MLC_SYS_UTIL_VERSION_RE: rsync\s+version\s+([\d.]+)
      MLC_TMP_VERSION_DETECT_GROUP_NUMBER: 0
    new_env_keys:
    - MLC_RSYNC_VERSION
    state:
      rsync:
        choco: rsync
  sox:
    env:
      MLC_SYS_UTIL_NAME: sox
      MLC_SYS_UTIL_VERSION_CMD: sox --version
      MLC_SYS_UTIL_VERSION_RE: sox:\s+SoX\s+v([\d.]+)
      MLC_TMP_VERSION_DETECT_GROUP_NUMBER: 0
    new_env_keys:
    - MLC_SOX_VERSION
    state:
      sox:
        choco: sox
  unzip:
    env:
      MLC_SYS_UTIL_NAME: unzip
      MLC_SYS_UTIL_VERSION_CMD: unzip -v
    new_env_keys:
    - MLC_UNZIP_VERSION
    state:
      unzip:
        choco: unzip
  vim-common:
    env:
      MLC_SYS_UTIL_NAME: vim_common
      MLC_SYS_UTIL_VERSION_CMD: vim --version
      MLC_SYS_UTIL_VERSION_RE: VIM - Vi IMproved ([\d.]+)
      MLC_TMP_VERSION_DETECT_GROUP_NUMBER: 0
    new_env_keys:
    - MLC_VIM_COMMON_VERSION
    state:
      vim_common:
        choco: vim
  wget:
    env:
      MLC_SYS_UTIL_NAME: wget
      MLC_SYS_UTIL_VERSION_CMD: wget --version
      MLC_SYS_UTIL_VERSION_RE: Wget\s*([\d.]+)
      MLC_TMP_VERSION_DETECT_GROUP_NUMBER: 0
    new_env_keys:
    - MLC_WGET_VERSION
    state:
      wget:
        choco: wget
  wkhtmltopdf:
    env:
      MLC_SYS_UTIL_NAME: wkhtmltopdf
      MLC_SYS_UTIL_VERSION_CMD: wkhtmltopdf --version
      MLC_SYS_UTIL_VERSION_RE: wkhtmltopdf ([\d.]+)
      MLC_TMP_VERSION_DETECT_GROUP_NUMBER: 0
    new_env_keys:
    - MLC_WKHTMLTOPDF_VERSION
    state:
      wkhtmltopdf:
        choco: wkhtmltopdf
  xz:
    env:
      MLC_SYS_UTIL_NAME: xz
      MLC_SYS_UTIL_VERSION_CMD: xz --version
      MLC_SYS_UTIL_VERSION_RE: xz \(XZ Utils\) ([\d.]+)
      MLC_TMP_VERSION_DETECT_GROUP_NUMBER: 1
    new_env_keys:
    - MLC_XZ_VERSION
    state:
      xz:
        choco: xz
  zlib:
    env:
      MLC_SYS_UTIL_NAME: zlib
    new_env_keys:
    - MLC_ZLIB_VERSION
    state:
      zlib:
        choco: zlib
