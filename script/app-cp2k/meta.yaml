alias: app-cp2k
uid: 06ee7deaf8fd4b9d
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: HPC Application
tags:
- app
- cp2k

# Cache
cache: true

# Environment
new_env_keys:
- MLC_CP2K_SRC_PATH
- MLC_CP2K_INSTALL_PATH
- +LD_LIBRARY_PATH
- +PATH
new_state_keys: []

# Input mapping
input_mapping:
  clean: MLC_CP2K_CLEAN_BUILD
input_description:
  clean:
    desc: Set to 'true' to do a clean build (removes build and toolchain install dirs)

# Dependencies
deps:
- env:
    MLC_GIT_CHECKOUT_PATH_ENV_NAME: MLC_CP2K_SRC_PATH
    MLC_GIT_REPO_VERSION_ENV_NAME: MLC_CP2K_SRC_VERSION
  extra_cache_tags: cp2k,repo,cp2k-repo
  force_env_keys:
  - MLC_GIT_*
  names:
  - cp2k-repo
  tags: get,git,repo
  update_tags_from_env_with_prefix:
    _branch.:
    - MLC_GIT_CHECKOUT
    _repo.:
    - MLC_GIT_URL
    _sha.:
    - MLC_GIT_SHA
    _submodules.:
    - MLC_GIT_SUBMODULES
- tags: get,generic-sys-util,_autoconf
- env:
    MLC_GENERIC_SYS_UTIL_IGNORE_MISSING_PACKAGE: true
  tags: get,generic-sys-util,_build-essential
- tags: detect,cpu
- tags: get,cmake
- tags: get,blas
  names:
  - blas
prehook_deps: []
posthook_deps: []
post_deps: []

# Variations
variations:
  url.#:
    env:
      MLC_GIT_URL: '#'
    group: version
  url.official:
    default: true
    env:
      MLC_GIT_URL: https://github.com/cp2k/cp2k
    group: version
  branch.#:
    env:
      MLC_GIT_CHECKOUT: '#'
  sha.#:
    env:
      MLC_GIT_SHA: '#'
  version.official:
    base:
    - url.official

  # Compiler variations
  aocc:
    group: compiler
    env:
      MLC_CP2K_COMPILER: aocc
    deps:
    - tags: get,aocc
      names:
      - aocc
  gcc:
    group: compiler
    default: true
    env:
      MLC_CP2K_COMPILER: gcc
    deps:
    - tags: get,gcc
      names:
      - gcc
  llvm:
    group: compiler
    env:
      MLC_CP2K_COMPILER: llvm
    deps:
    - tags: get,llvm
      names:
      - llvm
  oneapi:
    group: compiler
    env:
      MLC_CP2K_COMPILER: oneapi
    deps:
    - tags: get,oneapi
      names:
      - oneapi

# Tests
tests:
  run_inputs: []
