alias: get-mlperf-training-src
uid: dc440bd88e794a28
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: MLPerf Training
tags:
- get
- src
- source
- training
- training-src
- training-source
- mlperf
- mlcommons

# Cache
cache: true

# Environment
default_env:
  MLC_GIT_CHECKOUT: master
  MLC_GIT_CHECKOUT_FOLDER: training
  MLC_GIT_DEPTH: --depth 4
  MLC_GIT_PATCH: 'no'
  MLC_GIT_RECURSE_SUBMODULES: ' --recurse-submodules'
new_env_keys:
- MLC_MLPERF_TRAINING_*
- MLC_MLPERF_TRAINING_LAST_RELEASE
- +PYTHONPATH

# Dependencies
prehook_deps:
- env:
    MLC_GIT_CHECKOUT_PATH_ENV_NAME: MLC_MLPERF_TRAINING_SOURCE
  extra_cache_tags: mlperf,training,src
  force_env_keys:
  - MLC_GIT_*
  names:
  - mlperf-training-repo
  tags: get,git,repo
  update_tags_from_env_with_prefix:
    _branch.:
    - MLC_GIT_CHECKOUT
    _repo.:
    - MLC_GIT_URL
    _sha.:
    - MLC_GIT_SHA
    _tag.:
    - MLC_GIT_CHECKOUT_TAG

# Variations
variations:
  branch.#:
    env:
      MLC_GIT_CHECKOUT: '#'
    group: checkout
  sha.#:
    env:
      MLC_GIT_SHA: '#'
    group: checkout
  tag.#:
    env:
      MLC_GIT_CHECKOUT_TAG: '#'
    group: checkout
  full-history:
    env:
      MLC_GIT_DEPTH: ''
    group: git-history
  short-history:
    default: true
    env:
      MLC_GIT_DEPTH: --depth 5
    group: git-history
  repo.#:
    env:
      MLC_GIT_URL: '#'
    group: repo
  cknowledge:
    default: true
    env:
      MLC_GIT_URL: https://github.com/cknowledge/training.git
    group: src
  mlcommons:
    env:
      MLC_GIT_URL: https://github.com/mlcommons/training.git
    group: src
  no-recurse-submodules:
    env:
      MLC_GIT_RECURSE_SUBMODULES: ''
  nvidia-retinanet:
    base:
    - patch
    env:
      MLC_GIT_PATCH_FILENAMES: nvidia-retinanet.patch,cpu_load.patch
  patch:
    env:
      MLC_GIT_PATCH: 'yes'

# Versions
default_version: master
versions:
  custom:
    env:
      MLC_MLPERF_LAST_RELEASE: custom
  master:
    env:
      MLC_MLPERF_LAST_RELEASE: v3.1
