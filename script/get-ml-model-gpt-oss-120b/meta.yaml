alias: get-ml-model-gpt-oss-120b
uid: d4e5f67890123456
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: AI/ML models
tags:
- get-ml-model-gpt-oss-120b
- get
- ml-model
- gpt-oss-120b
- llm

# Cache
cache: true

# Environment
new_env_keys:
- MLC_ML_MODEL_GPT_OSS_120B_PATH

# Input mapping
input_mapping:
  checkpoint: MLC_ML_MODEL_GPT_OSS_120B_PATH

# Variations
variations:
  mlc:
    default: true
    env:
      MLC_DOWNLOAD_SRC: mlcommons
    group: download-src
    prehook_deps:
    - enable_if_env:
        MLC_TMP_REQUIRE_DOWNLOAD:
        - 'yes'
      env:
        MLC_DOWNLOAD_FINAL_ENV_NAME: MLC_ML_MODEL_GPT_OSS_120B_PATH
        MLC_EXTRACT_FINAL_ENV_NAME: MLC_ML_MODEL_GPT_OSS_120B_PATH
      extra_cache_tags: ml,model,gpt-oss-120b
      force_cache: true
      force_env_keys:
      - MLC_OUTDIRNAME
      names:
      - gpt-oss-120b-model-dae
      tags: download-and-extract
      update_tags_from_env_with_prefix:
        _url.:
        - MLC_DOWNLOAD_URL
  r2-downloader:
    adr:
      gpt-oss-120b-model-dae:
        tags: _r2-downloader
        env:
          MLC_DOWNLOAD_URL: https://inference.mlcommons-storage.org/metadata/gpt-oss-model.uri
    default: true
    group: download-tool
  dry-run:
    env:
      MLC_DOWNLOAD_MODE: dry
    group: run-mode
  dry-run,r2-downloader:
    env:
      MLC_DOWNLOAD_EXTRA_OPTIONS: -x

# Output / debugging
print_env_at_the_end:
  MLC_ML_MODEL_GPT_OSS_120B_PATH: gpt-oss-120b model path

# Tests
tests:
  run_inputs:
  - variations_list:
    - r2-downloader,mlc,dry-run
