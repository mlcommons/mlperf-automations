alias: get-dataset-cifar10
uid: 2f0c0bb3663b4ed7
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: AI/ML datasets
tags:
- get
- dataset
- cifar10
- image-classification
- validation
- training

# Cache
cache: true

# Environment
new_env_keys:
- MLC_DATASET_*

# Dependencies
deps:
- tags: detect,os

# Variations
variations:
  python:
    default: true
    env:
      MLC_DATASET: CIFAR10
      MLC_DATASET_CIFAR10: https://www.cs.toronto.edu/~kriz/cifar-10-python.tar.gz
      MLC_DATASET_FILENAME: cifar-10-python.tar.gz
      MLC_DATASET_FILENAME1: cifar-10-python.tar
    group: data_format
  tiny:
    deps:
    - names:
      - python
      - python3
      tags: get,python3
    - tags: get,tinymlperf,src
    - tags: get,src,eembc,energy-runner
    env:
      MLC_DATASET_CONVERT_TO_TINYMLPERF: 'yes'
