alias: add-custom-nvidia-system
uid: b2e6c46c6e8745a3
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
category: MLPerf Inference
tags:
- add
- custom
- system
- nvidia

# Cache
cache: true

# Dependencies
deps:
- tags: detect,os
- tags: detect,cpu
- tags: get,sys-utils-mlc
- tags: get,python3
  names:
  - python
  - python3
- tags: get,cuda,_cudnn
- tags: get,tensorrt
- tags: get,cmake
- tags: get,generic-python-lib,_requests
- tags: get,generic,sys-util,_glog-dev
- tags: get,generic,sys-util,_gflags-dev
- tags: get,generic,sys-util,_libre2-dev
- tags: get,generic,sys-util,_libnuma-dev
- tags: get,generic,sys-util,_libboost-all-dev
- tags: get,generic,sys-util,_rapidjson-dev
- tags: get,nvidia,mlperf,inference,common-code
  names:
  - nvidia-inference-common-code
- tags: get,generic-python-lib,_pycuda
- tags: get,generic-python-lib,_package.typeguard
  enable_if_env:
    MLC_MLPERF_INFERENCE_VERSION:
    - '5.0'
    - 5.1-dev

# Variations
variations:
  custom:
    group: code
    add_deps_recursive:
      nvidia-inference-common-code:
        tags: _custom
  go:
    group: code
    add_deps_recursive:
      nvidia-inference-common-code:
        tags: _go
  mlcommons:
    group: code
    add_deps_recursive:
      nvidia-inference-common-code:
        tags: _mlcommons
  nvidia-only:
    group: code
    add_deps_recursive:
      nvidia-inference-common-code:
        tags: _nvidia-only
  v5.0:
    add_deps_recursive:
      nvidia-inference-common-code:
        tags: _v5.0
  v5.1-dev:
    add_deps_recursive:
      nvidia-inference-common-code:
        tags: _v5.1-dev

# Versions
versions:
  r2.1:
    add_deps_recursive:
      nvidia-inference-common-code:
        version: r2.1
  r3.0:
    add_deps_recursive:
      nvidia-inference-common-code:
        version: r3.0
  r3.1:
    add_deps_recursive:
      nvidia-inference-common-code:
        version: r3.1
  r4.0:
    add_deps_recursive:
      nvidia-inference-common-code:
        version: r4.0
  r5.0:
    add_deps_recursive:
      nvidia-inference-common-code:
        version: r5.0

# Docker / container
docker:
  real_run: false
