# Variations
variations:
  ic:
    add_deps:
      config-generator:
        tags: _ic
    default: true
    group: benchmark
  zc706:
    add_deps:
      config-generator:
        tags: _zc706
    default: true
    env:
      MLC_TINY_BOARD: zc706
    group: board

# Versions
versions: {}
