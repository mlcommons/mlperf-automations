alias: install-opencv-from-src
uid: 98552486a0bc4214
automation_alias: script
automation_uid: 5b4e0237da074764

# Metadata
name: Build opencv from sources
category: Compiler automation
tags:
- install
- get
- src
- from.src
- opencv
- opencv
- src-opencv

# Cache
cache: true

# Environment
env:
  MLC_GIT_URL: https://github.com/opencv/opencv
new_env_keys:
- MLC_OPENCV_*

# Dependencies
deps:
- tags: detect,os
- tags: detect,cpu
- env:
    MLC_GIT_CHECKOUT_PATH_ENV_NAME: MLC_OPENCV_SRC_REPO_PATH
  extra_cache_tags: opencv,src,opencv-src,opencv-src-repo
  names:
  - opencv-src-repo
  - opencv-src
  tags: get,git,repo
  update_tags_from_env_with_prefix:
    _branch.:
    - MLC_GIT_CHECKOUT
    _repo.:
    - MLC_GIT_URL
    _sha.:
    - MLC_GIT_CHECKOUT_SHA
    _tag.:
    - MLC_GIT_CHECKOUT_TAG
prehook_deps: []

# Variations
variations:
  repo.#:
    env:
      MLC_GIT_URL: '#'
    group: repo
  repo.https://github.com/opencv/opencv:
    default: true
    env:
      MLC_GIT_URL: https://github.com/opencv/opencv
    group: repo
  branch.#:
    env:
      MLC_GIT_CHECKOUT: '#'
  sha.#:
    env:
      MLC_GIT_CHECKOUT_SHA: '#'
  tag.#:
    ad:
      opencv-src-repo:
        tags: _no-recurse-submodules,_full-history
    env:
      MLC_GIT_CHECKOUT_TAG: '#'

# Versions
versions: {}

# Output / debugging
sort: 1000
